<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0, user-scalable=no">
  <title>个人中心 - 智能减脂助理</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* 个人中心页面特有样式 */

    /* 用户头像区域 */
    .profile-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 20px 0;
    }

    .profile-hero .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #22c55e;
      margin-bottom: 12px;
    }

    .profile-hero .user-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .profile-hero .user-goal {
      font-size: 14px;
      color: #22c55e;
      font-weight: 500;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-hero .user-goal i {
      font-size: 12px;
    }

    /* 坚持 streak */
    .streak-badge {
      margin-top: 10px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.15);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #f97316;
    }

    /* Bento 数据卡片 */
    .data-card {
      padding: 16px;
    }

    .data-card .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .data-card .data-row:not(:last-child) {
      border-bottom: 1px solid #1a1a1a;
    }

    .data-card .data-label {
      font-size: 13px;
      color: #71717a;
    }

    .data-card .data-value {
      font-size: 14px;
      font-weight: 600;
    }

    /* 大数据卡片 */
    .big-data-card {
      padding: 18px;
      text-align: center;
    }

    .big-data-card .bd-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px auto;
      font-size: 18px;
    }

    .big-data-card .bd-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .big-data-card .bd-label {
      font-size: 11px;
      color: #71717a;
      margin-top: 4px;
    }

    /* 活动等级卡片 */
    .activity-card {
      padding: 18px;
    }

    .activity-card .activity-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .activity-card .activity-header i {
      font-size: 16px;
      color: #22c55e;
    }

    .activity-card .activity-header span {
      font-size: 13px;
      color: #71717a;
      font-weight: 500;
    }

    .activity-card .activity-level {
      display: flex;
      gap: 4px;
    }

    .activity-card .level-dot {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #1a1a1a;
      transition: background 0.3s;
    }

    .activity-card .level-dot.filled {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    .activity-card .level-dot.filled.orange {
      background: linear-gradient(90deg, #f97316, #fb923c);
    }

    .activity-card .level-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #525252;
    }

    .activity-card .current-level {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
    }

    /* 设置列表 */
    .settings-section {
      margin-top: 8px;
    }

    .settings-section .section-label {
      font-size: 12px;
      color: #525252;
      font-weight: 500;
      padding: 0 4px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .settings-list {
      background: #09090B;
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .settings-item:hover {
      background: #111;
    }

    .settings-item:not(:last-child) {
      border-bottom: 1px solid #1a1a1a;
    }

    .settings-item .si-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .settings-item .si-label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .settings-item .si-arrow {
      color: #525252;
      font-size: 12px;
    }

    .settings-item .si-value {
      font-size: 13px;
      color: #525252;
    }

    /* 版本信息 */
    .version-info {
      text-align: center;
      font-size: 11px;
      color: #333;
      margin-top: 16px;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="iphone-frame">
    <!-- iOS 状态栏 -->
    <div class="status-bar">
      <span class="time">14:32</span>
      <div class="dynamic-island"></div>
      <div class="icons">
        <i class="fas fa-signal" style="font-size:13px"></i>
        <i class="fas fa-wifi" style="font-size:13px"></i>
        <div class="battery">
          <div class="battery-icon">
            <div class="battery-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 页面内容 -->
    <div class="page-content">
      <!-- 用户头像区域 -->
      <div class="profile-hero">
        <img class="avatar" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=120&h=120&fit=crop&crop=face" alt="用户头像">
        <div class="user-name">杨弘</div>
        <div class="user-goal">
          <i class="fas fa-bullseye"></i>
          6月减到 70kg
        </div>
        <div class="streak-badge">
          <i class="fas fa-fire"></i>
          已坚持 23 天
        </div>
      </div>

      <!-- Bento Grid 布局 -->
      <div class="bento-grid bento-grid-2">

        <!-- 身体数据卡片 -->
        <div class="bento-card data-card">
          <div class="data-row">
            <span class="data-label">身高</span>
            <span class="data-value">175 <span style="font-size:12px;color:#525252">cm</span></span>
          </div>
          <div class="data-row">
            <span class="data-label">当前体重</span>
            <span class="data-value text-green">76.8 <span style="font-size:12px;color:#525252">kg</span></span>
          </div>
          <div class="data-row">
            <span class="data-label">目标体重</span>
            <span class="data-value">70 <span style="font-size:12px;color:#525252">kg</span></span>
          </div>
        </div>

        <!-- 每日预算卡片 -->
        <div class="bento-card big-data-card">
          <div class="bd-icon" style="background:rgba(34,197,94,0.12)">
            <i class="fas fa-fire-flame-curved text-green"></i>
          </div>
          <div class="bd-value text-green">1,850</div>
          <div class="bd-label">每日热量预算 (kcal)</div>
        </div>

        <!-- 已坚持天数 -->
        <div class="bento-card big-data-card">
          <div class="bd-icon" style="background:rgba(249,115,22,0.12)">
            <i class="fas fa-calendar-check text-orange"></i>
          </div>
          <div class="bd-value text-orange">23</div>
          <div class="bd-label">已坚持天数</div>
        </div>

        <!-- 已减重量 -->
        <div class="bento-card big-data-card">
          <div class="bd-icon" style="background:rgba(59,130,246,0.12)">
            <i class="fas fa-arrow-trend-down text-blue"></i>
          </div>
          <div class="bd-value text-blue">-2.2</div>
          <div class="bd-label">已减 (kg)</div>
        </div>

        <!-- 活动等级 -->
        <div class="bento-card activity-card" style="grid-column: span 2">
          <div class="activity-header">
            <i class="fas fa-person-walking"></i>
            <span>活动等级</span>
          </div>
          <div class="activity-level">
            <div class="level-dot filled"></div>
            <div class="level-dot filled orange"></div>
            <div class="level-dot"></div>
            <div class="level-dot"></div>
            <div class="level-dot"></div>
          </div>
          <div class="level-labels">
            <span>久坐</span>
            <span>轻度</span>
            <span>中度</span>
            <span>活跃</span>
            <span>非常活跃</span>
          </div>
          <div class="current-level">轻度活动 <span style="font-size:12px;color:#525252;font-weight:400">（每周运动 1-3 次）</span></div>
        </div>

      </div>

      <!-- 设置列表 -->
      <div class="settings-section">
        <div class="section-label">设置</div>
        <div class="settings-list">
          <div class="settings-item">
            <div class="si-icon" style="background:rgba(34,197,94,0.12)">
              <i class="fas fa-bullseye text-green"></i>
            </div>
            <span class="si-label">目标设置</span>
            <span class="si-value">70kg</span>
            <i class="fas fa-chevron-right si-arrow"></i>
          </div>
          <div class="settings-item">
            <div class="si-icon" style="background:rgba(249,115,22,0.12)">
              <i class="fas fa-utensils text-orange"></i>
            </div>
            <span class="si-label">饮食偏好</span>
            <span class="si-value">无限制</span>
            <i class="fas fa-chevron-right si-arrow"></i>
          </div>
          <div class="settings-item">
            <div class="si-icon" style="background:rgba(59,130,246,0.12)">
              <i class="fas fa-bell text-blue"></i>
            </div>
            <span class="si-label">通知设置</span>
            <i class="fas fa-chevron-right si-arrow"></i>
          </div>
          <div class="settings-item">
            <div class="si-icon" style="background:rgba(161,161,170,0.12)">
              <i class="fas fa-file-export" style="color:#a1a1aa"></i>
            </div>
            <span class="si-label">数据导出</span>
            <i class="fas fa-chevron-right si-arrow"></i>
          </div>
          <div class="settings-item">
            <div class="si-icon" style="background:rgba(161,161,170,0.12)">
              <i class="fas fa-circle-info" style="color:#a1a1aa"></i>
            </div>
            <span class="si-label">关于</span>
            <span class="si-value">v1.0.0</span>
            <i class="fas fa-chevron-right si-arrow"></i>
          </div>
        </div>
      </div>

      <div class="version-info">
        SlimAI v1.0.0 · Made with care
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <a class="tab-item" href="home.html">
        <i class="fas fa-house"></i>
        <span>首页</span>
      </a>
      <a class="tab-item" href="camera.html">
        <i class="fas fa-camera"></i>
        <span>拍照</span>
      </a>
      <a class="tab-item" href="meal-log.html">
        <i class="fas fa-utensils"></i>
        <span>记录</span>
      </a>
      <a class="tab-item" href="ai-chat.html">
        <i class="fas fa-comment-dots"></i>
        <span>AI</span>
      </a>
      <a class="tab-item active" href="profile.html">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </a>
    </div>
  </div>
</body>
</html>
