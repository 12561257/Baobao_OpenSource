<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0, user-scalable=no">
  <title>进度追踪 - 智能减脂助理</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* 进度追踪页面特有样式 */

    .period-tabs {
      display: flex;
      gap: 4px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      padding: 3px;
      margin-bottom: 16px;
    }

    .period-tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #71717a;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      background: none;
      font-family: inherit;
    }

    .period-tab:hover {
      color: #a1a1aa;
    }

    .period-tab.active {
      background: #1a1a1a;
      color: #fff;
    }

    /* 体重趋势图 */
    .chart-card {
      padding: 20px;
      margin-bottom: 12px;
    }

    .chart-card .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .chart-card .chart-title {
      font-size: 13px;
      color: #71717a;
      font-weight: 500;
    }

    .chart-card .current-weight {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-top: 4px;
    }

    .chart-card .weight-change {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(34,197,94,0.12);
      font-size: 13px;
      font-weight: 600;
      color: #22c55e;
    }

    /* SVG 图表容器 */
    .chart-container {
      width: 100%;
      height: 160px;
      position: relative;
      margin-top: 8px;
    }

    .chart-container svg {
      width: 100%;
      height: 100%;
    }

    /* 统计数据卡片 */
    .stat-card {
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .stat-card .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .stat-card .stat-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .stat-card .stat-label {
      font-size: 12px;
      color: #71717a;
      margin-top: 4px;
    }

    .stat-card .stat-badge {
      margin-top: 6px;
    }

    /* 大数字卡片 */
    .big-stat-card {
      padding: 22px;
    }

    .big-stat-card .big-stat-label {
      font-size: 12px;
      color: #71717a;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .big-stat-card .big-stat-value {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-top: 6px;
    }

    .big-stat-card .big-stat-sub {
      font-size: 13px;
      color: #a1a1aa;
      margin-top: 4px;
    }

    /* 周报摘要卡片 */
    .weekly-report-card {
      padding: 20px;
      background: linear-gradient(135deg, rgba(34,197,94,0.06) 0%, rgba(59,130,246,0.06) 100%);
      border-color: rgba(34,197,94,0.1);
    }

    .weekly-report-card .report-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .weekly-report-card .report-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(34,197,94,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .weekly-report-card .report-title {
      font-size: 15px;
      font-weight: 600;
    }

    .weekly-report-card .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .report-metric {
      text-align: center;
      padding: 10px 4px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }

    .report-metric .rm-value {
      font-size: 18px;
      font-weight: 700;
    }

    .report-metric .rm-label {
      font-size: 10px;
      color: #71717a;
      margin-top: 2px;
    }

    /* 体脂 BMI 卡片 */
    .body-stat-card {
      padding: 16px;
    }

    .body-stat-card .bs-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .body-stat-card .bs-icon {
      font-size: 16px;
    }

    .body-stat-card .bs-name {
      font-size: 13px;
      color: #71717a;
      font-weight: 500;
    }

    .body-stat-card .bs-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .body-stat-card .bs-bar {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="iphone-frame">
    <!-- iOS 状态栏 -->
    <div class="status-bar">
      <span class="time">14:32</span>
      <div class="dynamic-island"></div>
      <div class="icons">
        <i class="fas fa-signal" style="font-size:13px"></i>
        <i class="fas fa-wifi" style="font-size:13px"></i>
        <div class="battery">
          <div class="battery-icon">
            <div class="battery-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 页面内容 -->
    <div class="page-content">
      <!-- 标题 -->
      <div class="page-header">
        <h1>进度追踪</h1>
      </div>

      <!-- 周期切换 -->
      <div class="period-tabs">
        <button class="period-tab">7 天</button>
        <button class="period-tab active">30 天</button>
        <button class="period-tab">90 天</button>
        <button class="period-tab">全部</button>
      </div>

      <!-- Bento Grid 布局 -->
      <div class="bento-grid bento-grid-2">

        <!-- 体重趋势图（跨两列） -->
        <div class="bento-card chart-card" style="grid-column: span 2">
          <div class="chart-header">
            <div>
              <div class="chart-title">体重趋势</div>
              <div class="current-weight">76.8<span style="font-size:18px;font-weight:400;color:#71717a"> kg</span></div>
            </div>
            <div class="weight-change">
              <i class="fas fa-arrow-down" style="font-size:11px"></i>
              2.2 kg
            </div>
          </div>
          <div class="chart-container">
            <svg viewBox="0 0 345 140" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- 网格线 -->
              <line x1="0" y1="20" x2="345" y2="20" stroke="#1a1a1a" stroke-width="0.5"/>
              <line x1="0" y1="55" x2="345" y2="55" stroke="#1a1a1a" stroke-width="0.5"/>
              <line x1="0" y1="90" x2="345" y2="90" stroke="#1a1a1a" stroke-width="0.5"/>
              <line x1="0" y1="125" x2="345" y2="125" stroke="#1a1a1a" stroke-width="0.5"/>

              <!-- Y 轴标签 -->
              <text x="2" y="18" fill="#525252" font-size="9" font-family="Inter">79</text>
              <text x="2" y="53" fill="#525252" font-size="9" font-family="Inter">78</text>
              <text x="2" y="88" fill="#525252" font-size="9" font-family="Inter">77</text>
              <text x="2" y="123" fill="#525252" font-size="9" font-family="Inter">76</text>

              <!-- 渐变填充区域 -->
              <defs>
                <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
                  <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
                </linearGradient>
                <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#16a34a"/>
                  <stop offset="100%" stop-color="#4ade80"/>
                </linearGradient>
              </defs>

              <!-- 填充区域 -->
              <path d="M20,25 Q50,28 80,30 T140,42 T200,55 T260,72 T310,85 L310,130 L20,130 Z"
                    fill="url(#chartFill)"/>

              <!-- 折线 -->
              <path d="M20,25 Q50,28 80,30 T140,42 T200,55 T260,72 T310,85"
                    stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

              <!-- 当前值标记点 -->
              <circle cx="310" cy="85" r="5" fill="#22c55e"/>
              <circle cx="310" cy="85" r="8" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>

              <!-- 起点标记 -->
              <circle cx="20" cy="25" r="3" fill="#16a34a" opacity="0.6"/>

              <!-- X 轴标签 -->
              <text x="20" y="138" fill="#525252" font-size="9" font-family="Inter">3/3</text>
              <text x="80" y="138" fill="#525252" font-size="9" font-family="Inter">3/10</text>
              <text x="140" y="138" fill="#525252" font-size="9" font-family="Inter">3/17</text>
              <text x="200" y="138" fill="#525252" font-size="9" font-family="Inter">3/24</text>
              <text x="260" y="138" fill="#525252" font-size="9" font-family="Inter">3/31</text>
            </svg>
          </div>
        </div>

        <!-- 当前体重 -->
        <div class="bento-card big-stat-card">
          <div class="big-stat-label">当前体重</div>
          <div class="big-stat-value text-green">76.8<span style="font-size:20px;font-weight:400;color:#525252"> kg</span></div>
          <div class="big-stat-sub">
            <i class="fas fa-arrow-down" style="color:#22c55e;font-size:11px"></i>
            较上周 -0.3kg
          </div>
        </div>

        <!-- 已减重量 -->
        <div class="bento-card stat-card">
          <div class="stat-icon" style="background:rgba(34,197,94,0.12)">
            <i class="fas fa-fire-flame-curved text-green"></i>
          </div>
          <div class="stat-value text-green">-2.2</div>
          <div class="stat-label">已减 (kg)</div>
          <div class="stat-badge">
            <span class="badge badge-green"><i class="fas fa-check" style="font-size:9px"></i> 正常</span>
          </div>
        </div>

        <!-- 距目标 -->
        <div class="bento-card stat-card">
          <div class="stat-icon" style="background:rgba(59,130,246,0.12)">
            <i class="fas fa-bullseye text-blue"></i>
          </div>
          <div class="stat-value text-blue">6.8</div>
          <div class="stat-label">距目标 (kg)</div>
          <div class="stat-badge">
            <span class="badge badge-blue">70 kg</span>
          </div>
        </div>

        <!-- 预计达标 -->
        <div class="bento-card stat-card">
          <div class="stat-icon" style="background:rgba(249,115,22,0.12)">
            <i class="fas fa-calendar-check text-orange"></i>
          </div>
          <div class="stat-value text-orange">8/15</div>
          <div class="stat-label">预计达标</div>
          <div class="stat-badge">
            <span class="badge badge-orange">约 135 天</span>
          </div>
        </div>

        <!-- 体脂率 -->
        <div class="bento-card body-stat-card">
          <div class="bs-header">
            <i class="fas fa-droplet text-blue bs-icon"></i>
            <span class="bs-name">体脂率</span>
          </div>
          <div class="bs-value">22.5<span style="font-size:14px;font-weight:400;color:#525252">%</span></div>
          <div class="bs-bar">
            <div class="progress-bar" style="height:4px">
              <div class="fill" style="width:45%; background: linear-gradient(90deg, #3b82f6, #60a5fa)"></div>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:10px; color:#525252">
            <span>偏胖</span>
            <span>正常</span>
            <span>偏瘦</span>
          </div>
        </div>

        <!-- BMI -->
        <div class="bento-card body-stat-card">
          <div class="bs-header">
            <i class="fas fa-heart-pulse text-green bs-icon"></i>
            <span class="bs-name">BMI</span>
          </div>
          <div class="bs-value">25.1</div>
          <div class="bs-bar">
            <div class="progress-bar" style="height:4px">
              <div class="fill" style="width:52%; background: linear-gradient(90deg, #22c55e, #4ade80)"></div>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:10px; color:#525252">
            <span>偏瘦</span>
            <span>正常</span>
            <span>超重</span>
          </div>
        </div>

        <!-- 周报摘要 -->
        <div class="bento-card weekly-report-card" style="grid-column: span 2">
          <div class="report-header">
            <div class="report-icon">
              <i class="fas fa-chart-line text-green"></i>
            </div>
            <div class="report-title">本周摘要</div>
          </div>
          <div class="report-grid">
            <div class="report-metric">
              <div class="rm-value text-green">1,680</div>
              <div class="rm-label">日均摄入 (kcal)</div>
            </div>
            <div class="report-metric">
              <div class="rm-value text-blue">85%</div>
              <div class="rm-label">达标率</div>
            </div>
            <div class="report-metric">
              <div class="rm-value text-orange">7,200</div>
              <div class="rm-label">日均步数</div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <a class="tab-item" href="home.html">
        <i class="fas fa-house"></i>
        <span>首页</span>
      </a>
      <a class="tab-item" href="camera.html">
        <i class="fas fa-camera"></i>
        <span>拍照</span>
      </a>
      <a class="tab-item" href="meal-log.html">
        <i class="fas fa-utensils"></i>
        <span>记录</span>
      </a>
      <a class="tab-item active" href="ai-chat.html">
        <i class="fas fa-comment-dots"></i>
        <span>AI</span>
      </a>
      <a class="tab-item" href="profile.html">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </a>
    </div>
  </div>
</body>
</html>
