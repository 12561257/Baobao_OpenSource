<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - 个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .phone-frame {
            width: 393px; height: 852px;
            border-radius: 40px; overflow: hidden;
            position: relative; background: #0a0a1a;
            box-shadow: 0 0 60px rgba(100,100,255,0.15), 0 0 120px rgba(80,60,180,0.1);
        }
        .mesh-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 50% 5%, rgba(40,20,100,0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 40%, rgba(20,60,120,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(60,20,100,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 90%, rgba(15,80,100,0.4) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a2e 0%, #0d0d2b 30%, #121230 60%, #0a0a1a 100%);
        }
        .glass {
            background: rgba(255,255,255,0.06);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.2);
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(140,160,255,0.5), 0 0 40px rgba(140,160,255,0.2);
        }
        .content {
            position: relative; z-index: 1; height: 100%;
            overflow-y: auto; padding-bottom: 90px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px 8px; color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600;
        }
        .tab-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: rgba(15,15,30,0.7);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 28px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: rgba(255,255,255,0.4); font-size: 10px; transition: color 0.3s; cursor: pointer;
        }
        .tab-item.active { color: rgba(160,180,255,0.95); }
        .tab-item i { font-size: 20px; }

        /* 头像发光圆环 */
        .avatar-ring {
            position: relative;
            width: 80px; height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(140,160,255,0.5), rgba(100,200,180,0.4), rgba(180,140,255,0.5));
            z-index: -1;
            filter: blur(2px);
        }
        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(140,160,255,0.15), rgba(100,200,180,0.1));
            z-index: -2;
            filter: blur(12px);
        }
        .avatar-inner {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(140,160,255,0.2), rgba(180,140,255,0.15));
            border: 2px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
        }

        /* 设置列表条目 */
        .setting-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .setting-item:hover {
            background: rgba(255,255,255,0.03);
        }
        .setting-item:first-child {
            border-radius: 18px 18px 0 0;
        }
        .setting-item:last-child {
            border-radius: 0 0 18px 18px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="mesh-bg"></div>

        <div class="content">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:6px;align-items:center;">
                    <i class="fas fa-signal" style="font-size:13px;"></i>
                    <i class="fas fa-wifi" style="font-size:13px;"></i>
                    <i class="fas fa-battery-full" style="font-size:15px;"></i>
                </span>
            </div>

            <!-- 头像区域 -->
            <div style="padding:16px 24px 20px;text-align:center;" class="animate-in">
                <div style="display:flex;justify-content:center;margin-bottom:14px;">
                    <div class="avatar-ring">
                        <div class="avatar-inner">
                            <i class="fas fa-user" style="font-size:30px;color:rgba(200,210,255,0.8);"></i>
                        </div>
                    </div>
                </div>
                <h1 style="color:#fff;font-size:22px;font-weight:700;">杨弘</h1>
                <p style="color:rgba(255,255,255,0.4);font-size:13px;margin-top:4px;">目标：减脂塑形，目标体重 70kg</p>
            </div>

            <!-- 数据卡片组 -->
            <div style="padding:0 24px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;" class="animate-in delay-1">
                <!-- 身体数据 -->
                <div class="glass" style="border-radius:18px;padding:16px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(140,160,255,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-ruler" style="font-size:10px;color:rgba(140,160,255,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.45);font-size:11px;">身体数据</span>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <div>
                            <p style="color:rgba(255,255,255,0.35);font-size:10px;">身高</p>
                            <p style="color:#fff;font-size:14px;font-weight:600;">175cm</p>
                        </div>
                        <div>
                            <p style="color:rgba(255,255,255,0.35);font-size:10px;">体重</p>
                            <p style="color:#fff;font-size:14px;font-weight:600;">76.8kg</p>
                        </div>
                    </div>
                </div>
                <!-- 活动等级 -->
                <div class="glass" style="border-radius:18px;padding:16px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(100,200,180,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-person-running" style="font-size:10px;color:rgba(100,200,180,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.45);font-size:11px;">活动等级</span>
                    </div>
                    <p style="color:#fff;font-size:14px;font-weight:600;">中等活跃</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:10px;margin-top:2px;">每周运动 3-4 次</p>
                </div>
            </div>

            <div style="padding:0 24px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;" class="animate-in delay-2">
                <!-- 每日预算 -->
                <div class="glass" style="border-radius:18px;padding:16px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(180,140,255,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-fire" style="font-size:10px;color:rgba(180,140,255,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.45);font-size:11px;">每日预算</span>
                    </div>
                    <p class="glow-text" style="color:#fff;font-size:22px;font-weight:800;">1,850</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:10px;">大卡/天</p>
                </div>
                <!-- 坚持天数 -->
                <div class="glass" style="border-radius:18px;padding:16px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(255,200,100,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-trophy" style="font-size:10px;color:rgba(255,200,100,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.45);font-size:11px;">坚持天数</span>
                    </div>
                    <p class="glow-text" style="color:#fff;font-size:28px;font-weight:800;">28</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:10px;">天连续打卡</p>
                </div>
            </div>

            <!-- 成就徽章 -->
            <div style="padding:0 24px 12px;" class="animate-in delay-3">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;">成就徽章</span>
                        <span style="color:rgba(140,160,255,0.5);font-size:11px;">3/12</span>
                    </div>
                    <div style="display:flex;gap:12px;justify-content:center;">
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(255,200,100,0.2),rgba(255,180,60,0.1));border:1px solid rgba(255,200,100,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;">
                                <i class="fas fa-fire-flame-curved" style="font-size:18px;color:rgba(255,200,100,0.8);"></i>
                            </div>
                            <span style="color:rgba(255,255,255,0.5);font-size:10px;">7天连续</span>
                        </div>
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(100,200,180,0.2),rgba(80,180,160,0.1));border:1px solid rgba(100,200,180,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;">
                                <i class="fas fa-weight-scale" style="font-size:18px;color:rgba(100,200,180,0.8);"></i>
                            </div>
                            <span style="color:rgba(255,255,255,0.5);font-size:10px;">首次减重</span>
                        </div>
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(140,160,255,0.2),rgba(120,140,220,0.1));border:1px solid rgba(140,160,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;">
                                <i class="fas fa-camera" style="font-size:18px;color:rgba(140,160,255,0.8);"></i>
                            </div>
                            <span style="color:rgba(255,255,255,0.5);font-size:10px;">拍照达人</span>
                        </div>
                        <div style="text-align:center;">
                            <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;">
                                <i class="fas fa-lock" style="font-size:16px;color:rgba(255,255,255,0.12);"></i>
                            </div>
                            <span style="color:rgba(255,255,255,0.2);font-size:10px;">未解锁</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 设置列表 -->
            <div style="padding:0 24px 20px;" class="animate-in delay-4">
                <div class="glass" style="border-radius:18px;overflow:hidden;">
                    <div class="setting-item">
                        <div style="width:32px;height:32px;border-radius:10px;background:rgba(140,160,255,0.1);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-bullseye" style="font-size:13px;color:rgba(140,160,255,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;flex:1;">目标设置</span>
                        <i class="fas fa-chevron-right" style="color:rgba(255,255,255,0.15);font-size:12px;"></i>
                    </div>
                    <div style="height:1px;background:rgba(255,255,255,0.04);margin:0 16px;"></div>
                    <div class="setting-item">
                        <div style="width:32px;height:32px;border-radius:10px;background:rgba(100,200,180,0.1);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-bell" style="font-size:13px;color:rgba(100,200,180,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;flex:1;">提醒设置</span>
                        <i class="fas fa-chevron-right" style="color:rgba(255,255,255,0.15);font-size:12px;"></i>
                    </div>
                    <div style="height:1px;background:rgba(255,255,255,0.04);margin:0 16px;"></div>
                    <div class="setting-item">
                        <div style="width:32px;height:32px;border-radius:10px;background:rgba(180,140,255,0.1);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-shield-halved" style="font-size:13px;color:rgba(180,140,255,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;flex:1;">隐私设置</span>
                        <i class="fas fa-chevron-right" style="color:rgba(255,255,255,0.15);font-size:12px;"></i>
                    </div>
                    <div style="height:1px;background:rgba(255,255,255,0.04);margin:0 16px;"></div>
                    <div class="setting-item">
                        <div style="width:32px;height:32px;border-radius:10px;background:rgba(255,200,100,0.1);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-circle-question" style="font-size:13px;color:rgba(255,200,100,0.7);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;flex:1;">帮助与反馈</span>
                        <i class="fas fa-chevron-right" style="color:rgba(255,255,255,0.15);font-size:12px;"></i>
                    </div>
                    <div style="height:1px;background:rgba(255,255,255,0.04);margin:0 16px;"></div>
                    <div class="setting-item" style="border-radius:0 0 18px 18px;">
                        <div style="width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-circle-info" style="font-size:13px;color:rgba(255,255,255,0.35);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;flex:1;">关于</span>
                        <i class="fas fa-chevron-right" style="color:rgba(255,255,255,0.15);font-size:12px;"></i>
                    </div>
                </div>
            </div>

            <!-- 版本信息 -->
            <div style="padding:0 24px 20px;text-align:center;" class="animate-in delay-5">
                <p style="color:rgba(255,255,255,0.15);font-size:11px;">版本 1.0.0</p>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item"><i class="fas fa-house"></i><span>首页</span></div>
            <div class="tab-item"><i class="fas fa-camera"></i><span>拍照</span></div>
            <div class="tab-item"><i class="fas fa-utensils"></i><span>饮食</span></div>
            <div class="tab-item"><i class="fas fa-chart-line"></i><span>进度</span></div>
            <div class="tab-item active"><i class="fas fa-robot"></i><span>AI</span></div>
        </div>
    </div>
</body>
</html>
