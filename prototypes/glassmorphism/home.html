<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - 首页</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 手机外框 */
        .phone-frame {
            width: 393px;
            height: 852px;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            background: #0a0a1a;
            box-shadow: 0 0 60px rgba(100, 100, 255, 0.15), 0 0 120px rgba(80, 60, 180, 0.1);
        }

        /* Mesh Gradient 背景 */
        .mesh-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(40, 20, 100, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(20, 60, 120, 0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 60%, rgba(60, 20, 100, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(15, 80, 100, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(30, 20, 80, 0.6) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a2e 0%, #0d0d2b 30%, #121230 60%, #0a0a1a 100%);
            animation: meshFloat 12s ease-in-out infinite alternate;
        }

        @keyframes meshFloat {
            0% { filter: hue-rotate(0deg) brightness(1); }
            50% { filter: hue-rotate(10deg) brightness(1.05); }
            100% { filter: hue-rotate(-5deg) brightness(1); }
        }

        /* 毛玻璃卡片基础样式 */
        .glass {
            background: rgba(255, 255, 255, 0.06);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 4px 30px rgba(0, 0, 0, 0.25);
        }

        /* 发光效果 */
        .glow-text {
            text-shadow: 0 0 20px rgba(140, 160, 255, 0.5), 0 0 40px rgba(140, 160, 255, 0.2);
        }

        .glow-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(140, 160, 255, 0.4), rgba(100, 200, 180, 0.3), rgba(180, 140, 255, 0.4));
            z-index: -1;
            filter: blur(8px);
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .glow-btn:hover::before { opacity: 1; }
        .glow-btn:active { transform: scale(0.96); }

        /* 内容区域 */
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 90px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }

        /* iOS 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
        }

        /* Tab Bar */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: rgba(15, 15, 30, 0.7);
            -webkit-backdrop-filter: blur(30px);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 0 28px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            transition: color 0.3s;
            cursor: pointer;
        }
        .tab-item.active { color: rgba(160, 180, 255, 0.95); }
        .tab-item i { font-size: 20px; }

        /* 热量环 SVG */
        .calorie-ring {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        .calorie-ring svg {
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 12px rgba(140, 160, 255, 0.4));
        }
        .calorie-ring .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.06);
            stroke-width: 10;
        }
        .calorie-ring .ring-progress {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 502;
            stroke-dashoffset: 168;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .calorie-ring .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* 迷你进度条 */
        .mini-bar {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin-top: 6px;
        }
        .mini-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Mesh Gradient 背景 -->
        <div class="mesh-bg"></div>

        <!-- 主内容 -->
        <div class="content">
            <!-- iOS 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:6px;align-items:center;">
                    <i class="fas fa-signal" style="font-size:13px;"></i>
                    <i class="fas fa-wifi" style="font-size:13px;"></i>
                    <i class="fas fa-battery-full" style="font-size:15px;"></i>
                </span>
            </div>

            <!-- 问候区域 -->
            <div style="padding: 8px 24px 0;" class="animate-in">
                <div class="glass" style="border-radius: 20px; padding: 16px 20px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <p style="color:rgba(255,255,255,0.5);font-size:13px;font-weight:400;">下午好</p>
                            <h1 style="color:#fff;font-size:22px;font-weight:700;margin-top:2px;">杨弘</h1>
                        </div>
                        <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,rgba(140,160,255,0.3),rgba(100,200,180,0.3));display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.15);">
                            <i class="fas fa-user" style="color:rgba(255,255,255,0.8);font-size:16px;"></i>
                        </div>
                    </div>
                    <p style="color:rgba(255,255,255,0.45);font-size:12px;margin-top:8px;">
                        <i class="fas fa-sparkles" style="margin-right:4px;color:rgba(140,160,255,0.6);"></i>
                        今日已摄入 1,200 大卡，继续保持
                    </p>
                </div>
            </div>

            <!-- 热量进度环 -->
            <div style="padding: 24px 24px 0;" class="animate-in delay-1">
                <div class="glass" style="border-radius: 24px; padding: 28px 20px;">
                    <div class="calorie-ring">
                        <svg width="200" height="200" viewBox="0 0 200 200">
                            <defs>
                                <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#8ca0ff"/>
                                    <stop offset="50%" stop-color="#64c8b4"/>
                                    <stop offset="100%" stop-color="#b48cff"/>
                                </linearGradient>
                            </defs>
                            <circle class="ring-bg" cx="100" cy="100" r="80"/>
                            <circle class="ring-progress" cx="100" cy="100" r="80"/>
                        </svg>
                        <div class="center-text">
                            <p style="color:rgba(255,255,255,0.5);font-size:11px;font-weight:400;">剩余</p>
                            <p class="glow-text" style="color:#fff;font-size:38px;font-weight:800;line-height:1;">650</p>
                            <p style="color:rgba(255,255,255,0.4);font-size:12px;font-weight:400;">大卡</p>
                        </div>
                    </div>
                    <div style="display:flex;justify-content:center;gap:24px;margin-top:16px;">
                        <div style="text-align:center;">
                            <p style="color:rgba(255,255,255,0.4);font-size:11px;">已摄入</p>
                            <p style="color:rgba(140,160,255,0.9);font-size:15px;font-weight:600;">1,200</p>
                        </div>
                        <div style="width:1px;height:28px;background:rgba(255,255,255,0.08);"></div>
                        <div style="text-align:center;">
                            <p style="color:rgba(255,255,255,0.4);font-size:11px;">目标</p>
                            <p style="color:rgba(100,200,180,0.9);font-size:15px;font-weight:600;">1,850</p>
                        </div>
                        <div style="width:1px;height:28px;background:rgba(255,255,255,0.08);"></div>
                        <div style="text-align:center;">
                            <p style="color:rgba(255,255,255,0.4);font-size:11px;">消耗</p>
                            <p style="color:rgba(180,140,255,0.9);font-size:15px;font-weight:600;">380</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 三大营养素 -->
            <div style="padding: 16px 24px 0;display:flex;gap:10px;" class="animate-in delay-2">
                <!-- 碳水 -->
                <div class="glass" style="flex:1;border-radius:16px;padding:14px 12px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(140,160,255,0.15);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-wheat-awn" style="font-size:10px;color:rgba(140,160,255,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.5);font-size:11px;">碳水</span>
                    </div>
                    <p style="color:#fff;font-size:16px;font-weight:700;">98g</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:10px;">/ 185g</p>
                    <div class="mini-bar">
                        <div class="mini-bar-fill" style="width:53%;background:linear-gradient(90deg,#8ca0ff,#6c8cff);"></div>
                    </div>
                </div>
                <!-- 蛋白质 -->
                <div class="glass" style="flex:1;border-radius:16px;padding:14px 12px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(100,200,180,0.15);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-drumstick-bite" style="font-size:10px;color:rgba(100,200,180,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.5);font-size:11px;">蛋白质</span>
                    </div>
                    <p style="color:#fff;font-size:16px;font-weight:700;">82g</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:10px;">/ 120g</p>
                    <div class="mini-bar">
                        <div class="mini-bar-fill" style="width:68%;background:linear-gradient(90deg,#64c8b4,#4cb8a0);"></div>
                    </div>
                </div>
                <!-- 脂肪 -->
                <div class="glass" style="flex:1;border-radius:16px;padding:14px 12px;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                        <div style="width:24px;height:24px;border-radius:8px;background:rgba(180,140,255,0.15);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-droplet" style="font-size:10px;color:rgba(180,140,255,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.5);font-size:11px;">脂肪</span>
                    </div>
                    <p style="color:#fff;font-size:16px;font-weight:700;">42g</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:10px;">/ 55g</p>
                    <div class="mini-bar">
                        <div class="mini-bar-fill" style="width:76%;background:linear-gradient(90deg,#b48cff,#9c70ff);"></div>
                    </div>
                </div>
            </div>

            <!-- 步数和饮水量 -->
            <div style="padding:16px 24px 0;display:flex;gap:10px;" class="animate-in delay-3">
                <!-- 今日步数 -->
                <div class="glass" style="flex:1;border-radius:18px;padding:18px 16px;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,rgba(140,160,255,0.2),rgba(100,200,180,0.2));display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-person-walking" style="font-size:18px;color:rgba(160,180,255,0.9);"></i>
                        </div>
                        <div>
                            <p style="color:rgba(255,255,255,0.45);font-size:11px;">今日步数</p>
                            <p style="color:#fff;font-size:20px;font-weight:700;">6,842</p>
                        </div>
                    </div>
                    <div class="mini-bar" style="margin-top:10px;">
                        <div class="mini-bar-fill" style="width:68%;background:linear-gradient(90deg,#8ca0ff,#64c8b4);"></div>
                    </div>
                    <p style="color:rgba(255,255,255,0.3);font-size:10px;margin-top:4px;">目标 10,000 步</p>
                </div>
                <!-- 饮水量 -->
                <div class="glass" style="flex:1;border-radius:18px;padding:18px 16px;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,rgba(80,180,220,0.2),rgba(100,200,180,0.2));display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-glass-water" style="font-size:18px;color:rgba(120,200,220,0.9);"></i>
                        </div>
                        <div>
                            <p style="color:rgba(255,255,255,0.45);font-size:11px;">饮水量</p>
                            <p style="color:#fff;font-size:20px;font-weight:700;">1.2<span style="font-size:13px;font-weight:400;color:rgba(255,255,255,0.5);">L</span></p>
                        </div>
                    </div>
                    <div class="mini-bar" style="margin-top:10px;">
                        <div class="mini-bar-fill" style="width:60%;background:linear-gradient(90deg,#50b4dc,#64c8b4);"></div>
                    </div>
                    <p style="color:rgba(255,255,255,0.3);font-size:10px;margin-top:4px;">目标 2.0L</p>
                </div>
            </div>

            <!-- 本周进度 -->
            <div style="padding:16px 24px 0;" class="animate-in delay-4">
                <div class="glass" style="border-radius:18px;padding:18px 20px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <p style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;">本周进度</p>
                        <span style="color:rgba(140,160,255,0.6);font-size:11px;">查看全部 <i class="fas fa-chevron-right" style="font-size:9px;"></i></span>
                    </div>
                    <!-- 周进度条形图 -->
                    <div style="display:flex;gap:6px;align-items:flex-end;height:60px;">
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;background:linear-gradient(180deg,rgba(140,160,255,0.5),rgba(140,160,255,0.2));height:45px;"></div>
                            <span style="color:rgba(255,255,255,0.3);font-size:9px;">一</span>
                        </div>
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;background:linear-gradient(180deg,rgba(100,200,180,0.5),rgba(100,200,180,0.2));height:52px;"></div>
                            <span style="color:rgba(255,255,255,0.3);font-size:9px;">二</span>
                        </div>
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;background:linear-gradient(180deg,rgba(140,160,255,0.5),rgba(140,160,255,0.2));height:38px;"></div>
                            <span style="color:rgba(255,255,255,0.3);font-size:9px;">三</span>
                        </div>
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;background:linear-gradient(180deg,rgba(180,140,255,0.5),rgba(180,140,255,0.2));height:55px;"></div>
                            <span style="color:rgba(255,255,255,0.3);font-size:9px;">四</span>
                        </div>
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;background:linear-gradient(180deg,rgba(100,200,180,0.5),rgba(100,200,180,0.2));height:48px;"></div>
                            <span style="color:rgba(255,255,255,0.3);font-size:9px;">五</span>
                        </div>
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;background:linear-gradient(180deg,rgba(140,160,255,0.5),rgba(140,160,255,0.2));height:42px;"></div>
                            <span style="color:rgba(255,255,255,0.3);font-size:9px;">六</span>
                        </div>
                        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:100%;border-radius:4px;border:1px dashed rgba(255,255,255,0.1);height:30px;"></div>
                            <span style="color:rgba(255,255,255,0.5);font-size:9px;">日</span>
                        </div>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);">
                        <span style="color:rgba(255,255,255,0.4);font-size:11px;">日均 1,680 大卡</span>
                        <span style="color:rgba(100,200,180,0.7);font-size:11px;">达标率 85%</span>
                    </div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div style="padding:16px 24px 20px;" class="animate-in delay-5">
                <div style="display:flex;gap:10px;">
                    <!-- 拍照记录 -->
                    <button class="glow-btn glass-strong" style="flex:1;border-radius:16px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;border:none;cursor:pointer;">
                        <div style="width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,rgba(140,160,255,0.3),rgba(180,140,255,0.2));display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-camera" style="font-size:15px;color:rgba(200,210,255,0.9);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:500;">拍照记录</span>
                    </button>
                    <!-- 语音输入 -->
                    <button class="glow-btn glass-strong" style="flex:1;border-radius:16px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;border:none;cursor:pointer;">
                        <div style="width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,rgba(100,200,180,0.3),rgba(80,180,220,0.2));display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-microphone" style="font-size:15px;color:rgba(160,220,200,0.9);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:500;">语音输入</span>
                    </button>
                    <!-- 问AI -->
                    <button class="glow-btn glass-strong" style="flex:1;border-radius:16px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;border:none;cursor:pointer;">
                        <div style="width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,rgba(180,140,255,0.3),rgba(140,160,255,0.2));display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-comment-dots" style="font-size:15px;color:rgba(200,180,255,0.9);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:500;">问 AI</span>
                    </button>
                </div>
            </div>
        </div>
