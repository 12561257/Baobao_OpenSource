<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - 拍照识别</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .phone-frame {
            width: 393px;
            height: 852px;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            background: #0a0a1a;
            box-shadow: 0 0 60px rgba(100, 100, 255, 0.15), 0 0 120px rgba(80, 60, 180, 0.1);
        }
        .mesh-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 10%, rgba(40, 20, 100, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(20, 60, 120, 0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 70%, rgba(60, 20, 100, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(15, 80, 100, 0.5) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a2e 0%, #0d0d2b 30%, #121230 60%, #0a0a1a 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.06);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 4px 24px rgba(0, 0, 0, 0.2);
        }
        .glass-strong {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 30px rgba(0, 0, 0, 0.25);
        }
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 90px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
        }
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: rgba(15, 15, 30, 0.7);
            -webkit-backdrop-filter: blur(30px);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 0 28px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            transition: color 0.3s;
            cursor: pointer;
        }
        .tab-item.active { color: rgba(160, 180, 255, 0.95); }
        .tab-item i { font-size: 20px; }

        /* 快门按钮 */
        .shutter-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.5);
            position: relative;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shutter-btn::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(140, 160, 255, 0.3);
            animation: shutterPulse 2s ease-in-out infinite;
        }
        .shutter-btn::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            transition: all 0.15s;
        }
        .shutter-btn:hover::after { background: #fff; }
        .shutter-btn:active { transform: scale(0.92); }
        .shutter-btn:active::after { inset: 8px; }

        @keyframes shutterPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* 食物图片区域 */
        .camera-view {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow:
                0 0 30px rgba(140, 160, 255, 0.15),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
        }
        .camera-view img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }
        /* 扫描线动画 */
        .scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(140, 160, 255, 0.8), transparent);
            box-shadow: 0 0 15px rgba(140, 160, 255, 0.5);
            animation: scanMove 2.5s ease-in-out infinite;
        }
        @keyframes scanMove {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 85%; opacity: 0; }
        }

        /* 识别结果标签 */
        .food-tag {
            position: absolute;
            background: rgba(15, 15, 40, 0.75);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(140, 160, 255, 0.3);
            border-radius: 8px;
            padding: 4px 10px;
            color: #fff;
            font-size: 11px;
            font-weight: 500;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }
        .delay-1 { animation-delay: 0.15s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.45s; }
        .delay-4 { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="mesh-bg"></div>

        <div class="content">
            <!-- iOS 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:6px;align-items:center;">
                    <i class="fas fa-signal" style="font-size:13px;"></i>
                    <i class="fas fa-wifi" style="font-size:13px;"></i>
                    <i class="fas fa-battery-full" style="font-size:15px;"></i>
                </span>
            </div>

            <!-- 标题 -->
            <div style="padding:8px 24px 16px;display:flex;justify-content:space-between;align-items:center;" class="animate-in">
                <div class="glass" style="border-radius:20px;padding:10px 18px;display:inline-flex;align-items:center;gap:8px;">
                    <i class="fas fa-camera" style="color:rgba(140,160,255,0.8);font-size:14px;"></i>
                    <span style="color:#fff;font-size:15px;font-weight:600;">拍照识别</span>
                </div>
                <div class="glass" style="border-radius:14px;padding:8px 14px;">
                    <i class="fas fa-images" style="color:rgba(255,255,255,0.5);font-size:14px;"></i>
                </div>
            </div>

            <!-- 相机取景区域 -->
            <div style="padding:0 24px;" class="animate-in delay-1">
                <div class="camera-view">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&h=400&fit=crop" alt="食物照片">
                    <div class="scan-line"></div>
                    <!-- 识别标签 -->
                    <div class="food-tag" style="top:25%;left:15%;">
                        <i class="fas fa-leaf" style="margin-right:4px;color:rgba(100,200,180,0.8);font-size:9px;"></i>
                        沙拉
                    </div>
                    <div class="food-tag" style="top:45%;right:12%;">
                        <i class="fas fa-egg" style="margin-right:4px;color:rgba(255,200,100,0.8);font-size:9px;"></i>
                        水煮蛋
                    </div>
                    <div class="food-tag" style="bottom:20%;left:30%;">
                        <i class="fas fa-bread-slice" style="margin-right:4px;color:rgba(200,160,100,0.8);font-size:9px;"></i>
                        全麦面包
                    </div>
                </div>
            </div>

            <!-- 快门按钮 -->
            <div style="padding:20px 0;display:flex;justify-content:center;align-items:center;gap:24px;" class="animate-in delay-1">
                <div style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;">
                    <i class="fas fa-bolt" style="color:rgba(255,255,255,0.5);font-size:16px;"></i>
                </div>
                <div class="shutter-btn"></div>
                <div style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;">
                    <i class="fas fa-rotate" style="color:rgba(255,255,255,0.5);font-size:16px;"></i>
                </div>
            </div>

            <!-- 识别结果 -->
            <div style="padding:0 24px;" class="animate-in delay-2">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div style="width:8px;height:8px;border-radius:50%;background:rgba(100,200,180,0.8);box-shadow:0 0 8px rgba(100,200,180,0.4);"></div>
                            <span style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;">识别结果</span>
                        </div>
                        <span style="color:rgba(100,200,180,0.7);font-size:11px;">置信度 96%</span>
                    </div>

                    <!-- 食物列表 -->
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:36px;height:36px;border-radius:10px;background:rgba(100,200,180,0.12);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-leaf" style="font-size:14px;color:rgba(100,200,180,0.8);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:#fff;font-size:13px;font-weight:500;">鸡胸肉沙拉</p>
                                <p style="color:rgba(255,255,255,0.35);font-size:11px;">约 250g</p>
                            </div>
                            <span style="color:rgba(140,160,255,0.9);font-size:14px;font-weight:600;">320 kcal</span>
                        </div>

                        <div style="height:1px;background:rgba(255,255,255,0.06);"></div>

                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,200,100,0.12);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-egg" style="font-size:14px;color:rgba(255,200,100,0.8);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:#fff;font-size:13px;font-weight:500;">水煮蛋 x2</p>
                                <p style="color:rgba(255,255,255,0.35);font-size:11px;">约 120g</p>
                            </div>
                            <span style="color:rgba(140,160,255,0.9);font-size:14px;font-weight:600;">180 kcal</span>
                        </div>

                        <div style="height:1px;background:rgba(255,255,255,0.06);"></div>

                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:36px;height:36px;border-radius:10px;background:rgba(200,160,100,0.12);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-bread-slice" style="font-size:14px;color:rgba(200,160,100,0.8);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:#fff;font-size:13px;font-weight:500;">全麦面包</p>
                                <p style="color:rgba(255,255,255,0.35);font-size:11px;">约 60g</p>
                            </div>
                            <span style="color:rgba(140,160,255,0.9);font-size:14px;font-weight:600;">180 kcal</span>
                        </div>
                    </div>

                    <!-- 汇总 -->
                    <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;">
                        <span style="color:rgba(255,255,255,0.5);font-size:12px;">合计估算</span>
                        <span style="color:#fff;font-size:18px;font-weight:700;">680 <span style="font-size:12px;font-weight:400;color:rgba(255,255,255,0.5);">大卡</span></span>
                    </div>
                </div>
            </div>

            <!-- AI 评语气泡 -->
            <div style="padding:16px 24px 0;" class="animate-in delay-3">
                <div class="glass" style="border-radius:20px;padding:16px 20px;border-color:rgba(140,160,255,0.15);">
                    <div style="display:flex;align-items:flex-start;gap:10px;">
                        <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,rgba(140,160,255,0.3),rgba(180,140,255,0.2));display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">
                            <i class="fas fa-robot" style="font-size:12px;color:rgba(200,210,255,0.9);"></i>
                        </div>
                        <div>
                            <p style="color:rgba(140,160,255,0.7);font-size:11px;font-weight:500;margin-bottom:6px;">AI 分析</p>
                            <p style="color:rgba(255,255,255,0.7);font-size:13px;line-height:1.6;">
                                这顿午饭约 <span style="color:#fff;font-weight:600;">680 大卡</span>，蛋白质充足但脂肪偏高。晚餐建议清淡，推荐清蒸鱼搭配蔬菜。
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 确认按钮 -->
            <div style="padding:20px 24px 24px;" class="animate-in delay-4">
                <button style="width:100%;padding:16px;border-radius:16px;border:none;cursor:pointer;background:linear-gradient(135deg,rgba(140,160,255,0.4),rgba(100,200,180,0.3));color:#fff;font-size:15px;font-weight:600;font-family:'Outfit',sans-serif;box-shadow:0 0 30px rgba(140,160,255,0.2);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;justify-content:center;gap:8px;" onmouseover="this.style.boxShadow='0 0 40px rgba(140,160,255,0.35)'" onmouseout="this.style.boxShadow='0 0 30px rgba(140,160,255,0.2)'" onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform='scale(1)'">
                    <i class="fas fa-check-circle"></i>
                    确认并记录
                </button>
            </div>
        </div>

        <!-- 底部 Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item">
                <i class="fas fa-house"></i>
                <span>首页</span>
            </div>
            <div class="tab-item active">
                <i class="fas fa-camera"></i>
                <span>拍照</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-utensils"></i>
                <span>饮食</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-chart-line"></i>
                <span>进度</span>
            </div>
            <div class="tab-item">
                <i class="fas fa-robot"></i>
                <span>AI</span>
            </div>
        </div>
    </div>
</body>
</html>
