<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - 进度追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .phone-frame {
            width: 393px; height: 852px;
            border-radius: 40px; overflow: hidden;
            position: relative; background: #0a0a1a;
            box-shadow: 0 0 60px rgba(100,100,255,0.15), 0 0 120px rgba(80,60,180,0.1);
        }
        .mesh-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(40,20,100,0.7) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(20,60,120,0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(60,20,100,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 60%, rgba(15,80,100,0.4) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a2e 0%, #0d0d2b 30%, #121230 60%, #0a0a1a 100%);
        }
        .glass {
            background: rgba(255,255,255,0.06);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.2);
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(140,160,255,0.5), 0 0 40px rgba(140,160,255,0.2);
        }
        .content {
            position: relative; z-index: 1; height: 100%;
            overflow-y: auto; padding-bottom: 90px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px 8px; color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600;
        }
        .tab-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: rgba(15,15,30,0.7);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 28px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: rgba(255,255,255,0.4); font-size: 10px; transition: color 0.3s; cursor: pointer;
        }
        .tab-item.active { color: rgba(160,180,255,0.95); }
        .tab-item i { font-size: 20px; }

        /* SVG 图表样式 */
        .chart-line {
            fill: none;
            stroke: url(#chartGradient);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px rgba(140,160,255,0.5));
        }
        .chart-area {
            fill: url(#areaGradient);
            opacity: 0.3;
        }
        .chart-dot {
            fill: #fff;
            filter: drop-shadow(0 0 4px rgba(140,160,255,0.8));
        }
        .chart-grid line {
            stroke: rgba(255,255,255,0.04);
            stroke-width: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* 折线绘制动画 */
        @keyframes drawLine {
            from { stroke-dashoffset: 500; }
            to { stroke-dashoffset: 0; }
        }
        .chart-line-animated {
            stroke-dasharray: 500;
            animation: drawLine 2s cubic-bezier(0.4,0,0.2,1) forwards;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="mesh-bg"></div>

        <div class="content">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:6px;align-items:center;">
                    <i class="fas fa-signal" style="font-size:13px;"></i>
                    <i class="fas fa-wifi" style="font-size:13px;"></i>
                    <i class="fas fa-battery-full" style="font-size:15px;"></i>
                </span>
            </div>

            <!-- 标题 -->
            <div style="padding:8px 24px 16px;" class="animate-in">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h1 style="color:#fff;font-size:24px;font-weight:700;">进度追踪</h1>
                    <div class="glass" style="border-radius:12px;padding:8px 12px;cursor:pointer;">
                        <i class="fas fa-sliders" style="color:rgba(255,255,255,0.5);font-size:14px;"></i>
                    </div>
                </div>
            </div>

            <!-- 体重趋势图 -->
            <div style="padding:0 24px 12px;" class="animate-in delay-1">
                <div class="glass" style="border-radius:22px;padding:20px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div>
                            <p style="color:rgba(255,255,255,0.5);font-size:12px;">体重趋势</p>
                            <p style="color:#fff;font-size:15px;font-weight:600;margin-top:2px;">近 30 天</p>
                        </div>
                        <div style="display:flex;gap:6px;">
                            <span class="glass" style="border-radius:8px;padding:4px 10px;color:rgba(140,160,255,0.8);font-size:11px;font-weight:500;">30天</span>
                            <span style="border-radius:8px;padding:4px 10px;color:rgba(255,255,255,0.3);font-size:11px;cursor:pointer;">90天</span>
                        </div>
                    </div>
                    <!-- SVG 折线图 -->
                    <svg viewBox="0 0 320 140" style="width:100%;overflow:visible;">
                        <defs>
                            <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#8ca0ff"/>
                                <stop offset="50%" stop-color="#64c8b4"/>
                                <stop offset="100%" stop-color="#b48cff"/>
                            </linearGradient>
                            <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#8ca0ff" stop-opacity="0.3"/>
                                <stop offset="100%" stop-color="#8ca0ff" stop-opacity="0"/>
                            </linearGradient>
                        </defs>
                        <!-- 网格线 -->
                        <g class="chart-grid">
                            <line x1="0" y1="20" x2="320" y2="20"/>
                            <line x1="0" y1="50" x2="320" y2="50"/>
                            <line x1="0" y1="80" x2="320" y2="80"/>
                            <line x1="0" y1="110" x2="320" y2="110"/>
                        </g>
                        <!-- Y轴标签 -->
                        <text x="0" y="18" fill="rgba(255,255,255,0.2)" font-size="9" font-family="Outfit">79</text>
                        <text x="0" y="48" fill="rgba(255,255,255,0.2)" font-size="9" font-family="Outfit">78</text>
                        <text x="0" y="78" fill="rgba(255,255,255,0.2)" font-size="9" font-family="Outfit">77</text>
                        <text x="0" y="108" fill="rgba(255,255,255,0.2)" font-size="9" font-family="Outfit">76</text>
                        <!-- 面积填充 -->
                        <path class="chart-area" d="M20,25 L66,32 L112,28 L158,42 L204,50 L250,55 L296,58 L296,130 L20,130 Z"/>
                        <!-- 折线 -->
                        <path class="chart-line chart-line-animated" d="M20,25 L66,32 L112,28 L158,42 L204,50 L250,55 L296,58"/>
                        <!-- 数据点 -->
                        <circle class="chart-dot" cx="20" cy="25" r="3"/>
                        <circle class="chart-dot" cx="66" cy="32" r="3"/>
                        <circle class="chart-dot" cx="112" cy="28" r="3"/>
                        <circle class="chart-dot" cx="158" cy="42" r="3"/>
                        <circle class="chart-dot" cx="204" cy="50" r="3"/>
                        <circle class="chart-dot" cx="250" cy="55" r="3"/>
                        <circle class="chart-dot" cx="296" cy="58" r="4" style="filter:drop-shadow(0 0 8px rgba(140,160,255,0.8));"/>
                        <!-- X轴标签 -->
                        <text x="20" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Outfit" text-anchor="middle">3/3</text>
                        <text x="112" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Outfit" text-anchor="middle">3/13</text>
                        <text x="204" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Outfit" text-anchor="middle">3/23</text>
                        <text x="296" y="138" fill="rgba(140,160,255,0.6)" font-size="9" font-family="Outfit" text-anchor="middle" font-weight="600">今天</text>
                    </svg>
                </div>
            </div>

            <!-- 数据网格 -->
            <div style="padding:0 24px 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;" class="animate-in delay-2">
                <!-- 当前体重 -->
                <div class="glass" style="border-radius:18px;padding:18px 16px;text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:6px;">当前体重</p>
                    <p class="glow-text" style="color:#fff;font-size:28px;font-weight:800;">76.8</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:11px;">kg</p>
                </div>
                <!-- 已减 -->
                <div class="glass" style="border-radius:18px;padding:18px 16px;text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:6px;">已减</p>
                    <p style="color:rgba(100,200,180,0.9);font-size:28px;font-weight:800;">2.2</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:11px;">kg <i class="fas fa-arrow-down" style="font-size:9px;color:rgba(100,200,180,0.6);"></i></p>
                </div>
                <!-- 距目标 -->
                <div class="glass" style="border-radius:18px;padding:18px 16px;text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:6px;">距目标</p>
                    <p style="color:rgba(180,140,255,0.9);font-size:28px;font-weight:800;">6.8</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:11px;">kg</p>
                </div>
                <!-- 预计达标日 -->
                <div class="glass" style="border-radius:18px;padding:18px 16px;text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:6px;">预计达标</p>
                    <p style="color:rgba(140,160,255,0.9);font-size:22px;font-weight:700;">6/15</p>
                    <p style="color:rgba(255,255,255,0.35);font-size:11px;">约 74 天</p>
                </div>
            </div>

            <!-- 周报 -->
            <div style="padding:0 24px 12px;" class="animate-in delay-3">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <div style="width:28px;height:28px;border-radius:9px;background:rgba(140,160,255,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-chart-bar" style="font-size:12px;color:rgba(140,160,255,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;">本周报告</span>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="color:rgba(255,255,255,0.5);font-size:12px;">日均摄入</span>
                            <span style="color:#fff;font-size:14px;font-weight:600;">1,680 大卡</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);"></div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="color:rgba(255,255,255,0.5);font-size:12px;">达标率</span>
                            <span style="color:rgba(100,200,180,0.9);font-size:14px;font-weight:600;">85%</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);"></div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="color:rgba(255,255,255,0.5);font-size:12px;">体重变化</span>
                            <span style="color:rgba(100,200,180,0.9);font-size:14px;font-weight:600;">-0.5 kg</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);"></div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="color:rgba(255,255,255,0.5);font-size:12px;">运动消耗</span>
                            <span style="color:rgba(180,140,255,0.9);font-size:14px;font-weight:600;">2,340 大卡</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI 建议 -->
            <div style="padding:0 24px 20px;" class="animate-in delay-4">
                <div class="glass" style="border-radius:20px;padding:16px 20px;border-color:rgba(100,200,180,0.12);">
                    <div style="display:flex;align-items:flex-start;gap:10px;">
                        <div style="width:28px;height:28px;border-radius:9px;background:rgba(100,200,180,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                            <i class="fas fa-lightbulb" style="font-size:12px;color:rgba(100,200,180,0.8);"></i>
                        </div>
                        <p style="color:rgba(255,255,255,0.6);font-size:12px;line-height:1.6;">
                            本周趋势良好，减重速度稳定在每周 0.5kg 左右。建议下周适当增加蛋白质摄入至每日 130g，有助于维持肌肉量。
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item"><i class="fas fa-house"></i><span>首页</span></div>
            <div class="tab-item"><i class="fas fa-camera"></i><span>拍照</span></div>
            <div class="tab-item"><i class="fas fa-utensils"></i><span>饮食</span></div>
            <div class="tab-item active"><i class="fas fa-chart-line"></i><span>进度</span></div>
            <div class="tab-item"><i class="fas fa-robot"></i><span>AI</span></div>
        </div>
    </div>
</body>
</html>
