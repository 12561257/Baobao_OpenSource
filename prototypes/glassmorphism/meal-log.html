<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - 饮食记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .phone-frame {
            width: 393px; height: 852px;
            border-radius: 40px; overflow: hidden;
            position: relative; background: #0a0a1a;
            box-shadow: 0 0 60px rgba(100,100,255,0.15), 0 0 120px rgba(80,60,180,0.1);
        }
        .mesh-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 10% 30%, rgba(40,20,100,0.7) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 20%, rgba(20,60,120,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 70%, rgba(60,20,100,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 90%, rgba(15,80,100,0.4) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a2e 0%, #0d0d2b 30%, #121230 60%, #0a0a1a 100%);
        }
        .glass {
            background: rgba(255,255,255,0.06);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.2);
        }
        .content {
            position: relative; z-index: 1; height: 100%;
            overflow-y: auto; padding-bottom: 140px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px 8px; color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600;
        }
        .tab-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: rgba(15,15,30,0.7);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 28px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: rgba(255,255,255,0.4); font-size: 10px; transition: color 0.3s; cursor: pointer;
        }
        .tab-item.active { color: rgba(160,180,255,0.95); }
        .tab-item i { font-size: 20px; }

        /* 浮动添加按钮 */
        .fab {
            position: absolute; bottom: 100px; right: 24px; z-index: 11;
            width: 52px; height: 52px; border-radius: 16px;
            background: linear-gradient(135deg, rgba(140,160,255,0.5), rgba(100,200,180,0.4));
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 25px rgba(140,160,255,0.3);
        }
        .fab:hover { box-shadow: 0 0 40px rgba(140,160,255,0.5); transform: scale(1.05); }
        .fab:active { transform: scale(0.95); }

        /* 底部汇总条 */
        .summary-bar {
            position: absolute; bottom: 68px; left: 16px; right: 16px; z-index: 9;
            background: rgba(15,15,40,0.8);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px; padding: 14px 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="mesh-bg"></div>

        <div class="content">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:6px;align-items:center;">
                    <i class="fas fa-signal" style="font-size:13px;"></i>
                    <i class="fas fa-wifi" style="font-size:13px;"></i>
                    <i class="fas fa-battery-full" style="font-size:15px;"></i>
                </span>
            </div>

            <!-- 标题 -->
            <div style="padding:8px 24px 16px;" class="animate-in">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h1 style="color:#fff;font-size:24px;font-weight:700;">今日饮食</h1>
                    <div style="display:flex;gap:8px;">
                        <div class="glass" style="border-radius:12px;padding:8px 12px;cursor:pointer;">
                            <i class="fas fa-calendar" style="color:rgba(255,255,255,0.5);font-size:14px;"></i>
                        </div>
                    </div>
                </div>
                <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:4px;">4月2日 周三</p>
            </div>

            <!-- 早餐 -->
            <div style="padding:0 24px 12px;" class="animate-in delay-1">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <div style="width:28px;height:28px;border-radius:9px;background:rgba(255,200,100,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-sun" style="font-size:12px;color:rgba(255,200,100,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;">早餐</span>
                        <span style="color:rgba(255,255,255,0.3);font-size:12px;margin-left:auto;">380 大卡</span>
                    </div>
                    <!-- 食物条目 -->
                    <div style="display:flex;flex-direction:column;gap:0;">
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                            <div style="width:32px;height:32px;border-radius:9px;background:rgba(200,160,100,0.1);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-bread-slice" style="font-size:12px;color:rgba(200,160,100,0.7);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:rgba(255,255,255,0.8);font-size:13px;">全麦吐司 x2</p>
                            </div>
                            <span style="color:rgba(255,255,255,0.4);font-size:12px;">180 kcal</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);margin:2px 0;"></div>
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                            <div style="width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-mug-hot" style="font-size:12px;color:rgba(255,255,255,0.5);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:rgba(255,255,255,0.8);font-size:13px;">脱脂牛奶 250ml</p>
                            </div>
                            <span style="color:rgba(255,255,255,0.4);font-size:12px;">90 kcal</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);margin:2px 0;"></div>
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                            <div style="width:32px;height:32px;border-radius:9px;background:rgba(255,200,100,0.1);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-egg" style="font-size:12px;color:rgba(255,200,100,0.7);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:rgba(255,255,255,0.8);font-size:13px;">水煮蛋 x1</p>
                            </div>
                            <span style="color:rgba(255,255,255,0.4);font-size:12px;">110 kcal</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 午餐 -->
            <div style="padding:0 24px 12px;" class="animate-in delay-2">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <div style="width:28px;height:28px;border-radius:9px;background:rgba(140,160,255,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-cloud-sun" style="font-size:12px;color:rgba(140,160,255,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;">午餐</span>
                        <span style="color:rgba(255,255,255,0.3);font-size:12px;margin-left:auto;">680 大卡</span>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:0;">
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                            <div style="width:32px;height:32px;border-radius:9px;background:rgba(100,200,180,0.1);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-leaf" style="font-size:12px;color:rgba(100,200,180,0.7);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:rgba(255,255,255,0.8);font-size:13px;">鸡胸肉沙拉</p>
                            </div>
                            <span style="color:rgba(255,255,255,0.4);font-size:12px;">320 kcal</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);margin:2px 0;"></div>
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                            <div style="width:32px;height:32px;border-radius:9px;background:rgba(255,200,100,0.1);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-egg" style="font-size:12px;color:rgba(255,200,100,0.7);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:rgba(255,255,255,0.8);font-size:13px;">水煮蛋 x2</p>
                            </div>
                            <span style="color:rgba(255,255,255,0.4);font-size:12px;">180 kcal</span>
                        </div>
                        <div style="height:1px;background:rgba(255,255,255,0.04);margin:2px 0;"></div>
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                            <div style="width:32px;height:32px;border-radius:9px;background:rgba(200,160,100,0.1);display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-bread-slice" style="font-size:12px;color:rgba(200,160,100,0.7);"></i>
                            </div>
                            <div style="flex:1;">
                                <p style="color:rgba(255,255,255,0.8);font-size:13px;">全麦面包</p>
                            </div>
                            <span style="color:rgba(255,255,255,0.4);font-size:12px;">180 kcal</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 晚餐（空状态） -->
            <div style="padding:0 24px 12px;" class="animate-in delay-3">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <div style="width:28px;height:28px;border-radius:9px;background:rgba(180,140,255,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-moon" style="font-size:12px;color:rgba(180,140,255,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;">晚餐</span>
                        <span style="color:rgba(255,255,255,0.3);font-size:12px;margin-left:auto;">待记录</span>
                    </div>
                    <div style="padding:12px 0;text-align:center;">
                        <i class="fas fa-plus-circle" style="font-size:24px;color:rgba(255,255,255,0.12);"></i>
                        <p style="color:rgba(255,255,255,0.25);font-size:12px;margin-top:6px;">点击添加晚餐记录</p>
                    </div>
                </div>
            </div>

            <!-- 加餐 -->
            <div style="padding:0 24px 12px;" class="animate-in delay-4">
                <div class="glass" style="border-radius:20px;padding:18px 20px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                        <div style="width:28px;height:28px;border-radius:9px;background:rgba(100,200,180,0.12);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-cookie-bite" style="font-size:12px;color:rgba(100,200,180,0.8);"></i>
                        </div>
                        <span style="color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;">加餐</span>
                        <span style="color:rgba(255,255,255,0.3);font-size:12px;margin-left:auto;">140 大卡</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;">
                        <div style="width:32px;height:32px;border-radius:9px;background:rgba(100,200,180,0.1);display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-apple-whole" style="font-size:12px;color:rgba(100,200,180,0.7);"></i>
                        </div>
                        <div style="flex:1;">
                            <p style="color:rgba(255,255,255,0.8);font-size:13px;">苹果 x1</p>
                        </div>
                        <span style="color:rgba(255,255,255,0.4);font-size:12px;">140 kcal</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 浮动添加按钮 -->
        <div class="fab">
            <i class="fas fa-plus" style="color:#fff;font-size:20px;"></i>
        </div>

        <!-- 底部汇总条 -->
        <div class="summary-bar">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:10px;">总摄入</p>
                    <p style="color:#fff;font-size:16px;font-weight:700;">1,200</p>
                </div>
                <div style="width:1px;height:28px;background:rgba(255,255,255,0.08);"></div>
                <div style="text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:10px;">目标</p>
                    <p style="color:rgba(100,200,180,0.9);font-size:16px;font-weight:700;">1,850</p>
                </div>
                <div style="width:1px;height:28px;background:rgba(255,255,255,0.08);"></div>
                <div style="text-align:center;">
                    <p style="color:rgba(255,255,255,0.4);font-size:10px;">剩余</p>
                    <p style="color:rgba(140,160,255,0.9);font-size:16px;font-weight:700;">650</p>
                </div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item"><i class="fas fa-house"></i><span>首页</span></div>
            <div class="tab-item"><i class="fas fa-camera"></i><span>拍照</span></div>
            <div class="tab-item active"><i class="fas fa-utensils"></i><span>饮食</span></div>
            <div class="tab-item"><i class="fas fa-chart-line"></i><span>进度</span></div>
            <div class="tab-item"><i class="fas fa-robot"></i><span>AI</span></div>
        </div>
    </div>
</body>
</html>
