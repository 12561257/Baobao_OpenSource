<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - AI 助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .phone-frame {
            width: 393px; height: 852px;
            border-radius: 40px; overflow: hidden;
            position: relative; background: #0a0a1a;
            box-shadow: 0 0 60px rgba(100,100,255,0.15), 0 0 120px rgba(80,60,180,0.1);
        }
        .mesh-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 30% 15%, rgba(40,20,100,0.7) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, rgba(20,60,120,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 85%, rgba(60,20,100,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 75%, rgba(15,80,100,0.4) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a2e 0%, #0d0d2b 30%, #121230 60%, #0a0a1a 100%);
        }
        .glass {
            background: rgba(255,255,255,0.06);
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.2);
        }
        .content {
            position: relative; z-index: 1; height: 100%;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px 8px; color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600;
        }
        .tab-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            background: rgba(15,15,30,0.7);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 28px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: rgba(255,255,255,0.4); font-size: 10px; transition: color 0.3s; cursor: pointer;
        }
        .tab-item.active { color: rgba(160,180,255,0.95); }
        .tab-item i { font-size: 20px; }

        /* 聊天消息样式 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 16px;
            scrollbar-width: none;
        }
        .chat-area::-webkit-scrollbar { display: none; }

        .msg-ai {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .msg-ai .bubble {
            background: rgba(255,255,255,0.07);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px 18px 18px 4px;
            padding: 14px 18px;
            max-width: 260px;
            color: rgba(255,255,255,0.8);
            font-size: 13.5px;
            line-height: 1.6;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .msg-user {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }
        .msg-user .bubble {
            background: rgba(140,160,255,0.12);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(140,160,255,0.15);
            border-radius: 18px 18px 4px 18px;
            padding: 14px 18px;
            max-width: 240px;
            color: rgba(255,255,255,0.85);
            font-size: 13.5px;
            line-height: 1.6;
        }

        /* 输入框 */
        .input-area {
            padding: 0 16px 80px;
            position: relative;
            z-index: 5;
        }
        .input-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.06);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px 10px 10px 18px;
        }
        .input-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
        }
        .input-box input::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .voice-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(140,160,255,0.4), rgba(100,200,180,0.3));
            border: 1px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 15px rgba(140,160,255,0.2);
            flex-shrink: 0;
        }
        .voice-btn:hover { box-shadow: 0 0 25px rgba(140,160,255,0.4); }
        .voice-btn:active { transform: scale(0.92); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* 打字指示器 */
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.4);
            display: inline-block;
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="mesh-bg"></div>

        <div class="content">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span style="display:flex;gap:6px;align-items:center;">
                    <i class="fas fa-signal" style="font-size:13px;"></i>
                    <i class="fas fa-wifi" style="font-size:13px;"></i>
                    <i class="fas fa-battery-full" style="font-size:15px;"></i>
                </span>
            </div>

            <!-- 标题栏 -->
            <div style="padding:4px 24px 14px;display:flex;align-items:center;gap:12px;" class="animate-in">
                <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,rgba(140,160,255,0.3),rgba(180,140,255,0.2));display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.15);box-shadow:0 0 20px rgba(140,160,255,0.2);flex-shrink:0;">
                    <i class="fas fa-robot" style="font-size:18px;color:rgba(200,210,255,0.9);"></i>
                </div>
                <div>
                    <h1 style="color:#fff;font-size:18px;font-weight:700;">AI 助理</h1>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <div style="width:6px;height:6px;border-radius:50%;background:rgba(100,200,180,0.8);box-shadow:0 0 6px rgba(100,200,180,0.4);"></div>
                        <span style="color:rgba(100,200,180,0.7);font-size:11px;">在线</span>
                    </div>
                </div>
                <div style="margin-left:auto;" class="glass" style="border-radius:12px;padding:8px 12px;">
                    <div class="glass" style="border-radius:12px;padding:8px 12px;cursor:pointer;">
                        <i class="fas fa-ellipsis" style="color:rgba(255,255,255,0.4);font-size:14px;"></i>
                    </div>
                </div>
            </div>

            <!-- 聊天区域 -->
            <div class="chat-area">
                <!-- AI 消息 1 -->
                <div class="msg-ai animate-in delay-1">
                    <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,rgba(140,160,255,0.25),rgba(180,140,255,0.15));display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);">
                        <i class="fas fa-robot" style="font-size:12px;color:rgba(200,210,255,0.7);"></i>
                    </div>
                    <div class="bubble">
                        杨弘，下午好！今天已摄入 <span style="color:#fff;font-weight:600;">1,200 大卡</span>，还剩 <span style="color:rgba(100,200,180,0.9);font-weight:600;">650 大卡</span>。晚餐有计划吗？
                    </div>
                </div>

                <!-- 用户消息 1 -->
                <div class="msg-user animate-in delay-2">
                    <div class="bubble">
                        晚上要去吃火锅
                    </div>
                </div>

                <!-- AI 消息 2 -->
                <div class="msg-ai animate-in delay-3">
                    <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,rgba(140,160,255,0.25),rgba(180,140,255,0.15));display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);">
                        <i class="fas fa-robot" style="font-size:12px;color:rgba(200,210,255,0.7);"></i>
                    </div>
                    <div class="bubble">
                        火锅也能健康吃！给你几个建议：<br><br>
                        <span style="color:rgba(255,255,255,0.5);font-size:12px;">
                            <span style="color:rgba(100,200,180,0.8);">1.</span> 清汤锅底优先<br>
                            <span style="color:rgba(100,200,180,0.8);">2.</span> 多选蔬菜和豆腐<br>
                            <span style="color:rgba(100,200,180,0.8);">3.</span> 肉类选牛肉和虾<br>
                            <span style="color:rgba(100,200,180,0.8);">4.</span> 蘸料用酱油醋
                        </span>
                        <br><br>
                        控制在 <span style="color:#fff;font-weight:600;">600 大卡</span> 内没问题！
                    </div>
                </div>

                <!-- 用户消息 2 -->
                <div class="msg-user animate-in delay-4">
                    <div class="bubble">
                        好的，谢谢！那锅底选番茄锅可以吗？
                    </div>
                </div>

                <!-- AI 消息 3（正在输入） -->
                <div class="msg-ai animate-in delay-5">
                    <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,rgba(140,160,255,0.25),rgba(180,140,255,0.15));display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);">
                        <i class="fas fa-robot" style="font-size:12px;color:rgba(200,210,255,0.7);"></i>
                    </div>
                    <div class="bubble" style="padding:14px 20px;">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            </div>

            <!-- 输入框 -->
            <div class="input-area">
                <div class="input-box">
                    <input type="text" placeholder="输入消息..." readonly>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;">
                            <i class="fas fa-paperclip" style="color:rgba(255,255,255,0.3);font-size:13px;"></i>
                        </div>
                        <div class="voice-btn">
                            <i class="fas fa-microphone" style="color:#fff;font-size:14px;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item"><i class="fas fa-house"></i><span>首页</span></div>
            <div class="tab-item"><i class="fas fa-camera"></i><span>拍照</span></div>
            <div class="tab-item"><i class="fas fa-utensils"></i><span>饮食</span></div>
            <div class="tab-item"><i class="fas fa-chart-line"></i><span>进度</span></div>
            <div class="tab-item active"><i class="fas fa-robot"></i><span>AI</span></div>
        </div>
    </div>
</body>
</html>
