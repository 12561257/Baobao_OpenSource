<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能减脂助理 - Glassmorphism 原型</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #08080f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 深色背景 Mesh */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(40, 20, 100, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(20, 60, 120, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(60, 20, 100, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 70%, rgba(15, 80, 100, 0.2) 0%, transparent 50%),
                linear-gradient(160deg, #08080f 0%, #0a0a1a 100%);
            z-index: -1;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            padding: 60px 24px 20px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #8ca0ff, #64c8b4, #b48cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .page-header p {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
        }
        .page-header .badge {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            backdrop-filter: blur(10px);
        }

        /* 原型展示区域 */
        .prototypes-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 40px 24px 80px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* 单个原型容器 */
        .prototype-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* 标签 */
        .prototype-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }
        .prototype-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .prototype-label span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
        }

        /* iframe 外框 */
        .iframe-wrapper {
            position: relative;
            border-radius: 44px;
            overflow: hidden;
            box-shadow:
                0 0 60px rgba(100, 100, 255, 0.08),
                0 0 120px rgba(80, 60, 180, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s;
        }
        .iframe-wrapper:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow:
                0 0 80px rgba(100, 100, 255, 0.15),
                0 0 160px rgba(80, 60, 180, 0.08),
                0 30px 80px rgba(0, 0, 0, 0.5);
        }

        .iframe-wrapper iframe {
            display: block;
            width: 393px;
            height: 852px;
            border: none;
        }

        /* 底部说明 */
        .footer-note {
            text-align: center;
            padding: 0 24px 60px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <div class="page-header">
        <h1>智能减脂助理</h1>
        <p>Glassmorphism 毛玻璃弥散光风格 · 高保真原型</p>
        <div class="badge">iPhone 15 Pro · 393 x 852 · 6 个核心界面</div>
    </div>

    <!-- 原型平铺展示 -->
    <div class="prototypes-grid">
        <!-- 首页仪表盘 -->
        <div class="prototype-item">
            <div class="prototype-label">
                <div class="dot" style="background:rgba(140,160,255,0.8);box-shadow:0 0 6px rgba(140,160,255,0.4);"></div>
                <span>首页仪表盘</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="home.html" loading="lazy"></iframe>
            </div>
        </div>

        <!-- 拍照识别 -->
        <div class="prototype-item">
            <div class="prototype-label">
                <div class="dot" style="background:rgba(100,200,180,0.8);box-shadow:0 0 6px rgba(100,200,180,0.4);"></div>
                <span>拍照识别</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="camera.html" loading="lazy"></iframe>
            </div>
        </div>

        <!-- 饮食记录 -->
        <div class="prototype-item">
            <div class="prototype-label">
                <div class="dot" style="background:rgba(180,140,255,0.8);box-shadow:0 0 6px rgba(180,140,255,0.4);"></div>
                <span>饮食记录</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="meal-log.html" loading="lazy"></iframe>
            </div>
        </div>

        <!-- 进度追踪 -->
        <div class="prototype-item">
            <div class="prototype-label">
                <div class="dot" style="background:rgba(80,180,220,0.8);box-shadow:0 0 6px rgba(80,180,220,0.4);"></div>
                <span>进度追踪</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="progress.html" loading="lazy"></iframe>
            </div>
        </div>

        <!-- AI 助理 -->
        <div class="prototype-item">
            <div class="prototype-label">
                <div class="dot" style="background:rgba(140,180,255,0.8);box-shadow:0 0 6px rgba(140,180,255,0.4);"></div>
                <span>AI 助理对话</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="ai-chat.html" loading="lazy"></iframe>
            </div>
        </div>

        <!-- 个人中心 -->
        <div class="prototype-item">
            <div class="prototype-label">
                <div class="dot" style="background:rgba(255,200,100,0.8);box-shadow:0 0 6px rgba(255,200,100,0.4);"></div>
                <span>个人中心</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="profile.html" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer-note">
        智能减脂助理 · Glassmorphism 原型 · 所有界面均为静态高保真展示
    </div>
</body>
</html>
