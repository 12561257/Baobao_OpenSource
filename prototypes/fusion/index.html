<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>混合风格智能减脂助理 - 全部界面</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f0f0f0;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --border: #e0e0e0;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 40px;
      line-height: 1.6;
    }

    /* 页面标题 */
    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .page-header h1 {
      font-family: var(--font-serif);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .page-header p {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .page-header .tag {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* 界面展示网格 */
    .screens-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 48px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* 单个界面展示 */
    .screen-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .screen-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .screen-frame {
      width: 393px;
      height: 852px;
      border-radius: 40px;
      overflow: hidden;
      border: 8px solid #1a1a1a;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.12),
        0 0 0 1px rgba(0,0,0,0.05);
      background: #fafafa;
      position: relative;
    }
    .screen-frame iframe {
      width: 393px;
      height: 852px;
      border: none;
      display: block;
    }

    /* 响应式：小屏幕缩放 */
    @media (max-width: 900px) {
      body { padding: 20px; }
      .page-header h1 { font-size: 32px; }
      .screens-grid { gap: 32px; }
      .screen-frame {
        transform: scale(0.75);
        transform-origin: top center;
      }
      .screen-item {
        margin-bottom: -200px;
      }
    }
  </style>
</head>
<body>

  <!-- 页面标题 -->
  <div class="page-header">
    <h1>Fusion Prototype</h1>
    <p>Bento Grid x Typography-First</p>
    <span class="tag">iPhone 15 Pro &middot; 393 x 852</span>
  </div>

  <!-- 界面展示 -->
  <div class="screens-grid">

    <!-- 首页仪表盘 -->
    <div class="screen-item">
      <div class="screen-label">01 &mdash; Home Dashboard</div>
      <div class="screen-frame">
        <iframe src="home.html" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 拍照识别 -->
    <div class="screen-item">
      <div class="screen-label">02 &mdash; Camera &amp; Recognition</div>
      <div class="screen-frame">
        <iframe src="camera.html" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 饮食记录 -->
    <div class="screen-item">
      <div class="screen-label">03 &mdash; Meal Log</div>
      <div class="screen-frame">
        <iframe src="meal-log.html" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 进度追踪 -->
    <div class="screen-item">
      <div class="screen-label">04 &mdash; Progress Tracking</div>
      <div class="screen-frame">
        <iframe src="progress.html" loading="lazy"></iframe>
      </div>
    </div>

    <!-- AI 助理 -->
    <div class="screen-item">
      <div class="screen-label">05 &mdash; AI Assistant</div>
      <div class="screen-frame">
        <iframe src="ai-chat.html" loading="lazy"></iframe>
      </div>
    </div>

    <!-- 个人中心 -->
    <div class="screen-item">
      <div class="screen-label">06 &mdash; Profile</div>
      <div class="screen-frame">
        <iframe src="profile.html" loading="lazy"></iframe>
      </div>
    </div>

  </div>

</body>
</html>
