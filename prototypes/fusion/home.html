<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>首页 - 混合风格智能减脂助理</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ========== 基础重置与设计令牌 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --border: #e5e5e5;
      --accent: #2d5a3d;
      --accent-light: #3a7a50;
      --black: #000000;
      --white: #ffffff;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      width: 393px;
      height: 852px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      line-height: 1.6;
      position: relative;
    }

    /* 自定义滚动条 */
    body::-webkit-scrollbar { width: 0; }

    /* ========== iOS 状态栏 ========== */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .status-bar .time { font-weight: 700; }
    .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }
    .status-bar .icons i { font-size: 12px; }

    /* ========== 主内容区 ========== */
    .content {
      padding: 0 20px 100px;
    }

    /* ========== 顶部问候区 ========== */
    .greeting-section {
      padding: 12px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .greeting-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .greeting-title {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text-primary);
    }
    .greeting-date {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: right;
      line-height: 1.5;
    }

    /* ========== Bento Grid 容器 ========== */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ========== 通用卡片样式 ========== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 20px;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: scale(0.98);
    }
    .card-full { grid-column: 1 / -1; }
    .card-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    /* ========== 热量大卡片 ========== */
    .calorie-card {
      text-align: center;
      padding: 32px 20px 28px;
    }
    .calorie-number {
      font-family: var(--font-serif);
      font-size: 84px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }
    .calorie-unit {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .calorie-detail {
      font-family: var(--font-serif);
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 16px;
      letter-spacing: 0.02em;
    }
    .calorie-bar-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    }
    .calorie-bar-fill {
      height: 100%;
      background: var(--black);
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========== 营养素三列 ========== */
    .macro-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .macro-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 12px;
      text-align: center;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .macro-card:hover { transform: scale(0.97); }
    .macro-name {
      font-family: var(--font-sans);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .macro-value {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .macro-target {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .macro-progress {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 10px;
      overflow: hidden;
    }
    .macro-progress-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--black);
    }

    /* ========== 步数 & 饮水卡片 ========== */
    .step-number {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
    }
    .step-target {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }
    .step-icon {
      font-size: 20px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .water-number {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
    }
    .water-target {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }
    .water-dots {
      display: flex;
      gap: 4px;
      margin-top: 12px;
    }
    .water-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      transition: background 0.3s;
    }
    .water-dot.filled {
      background: var(--black);
      border-color: var(--black);
    }

    /* ========== 周报横幅 ========== */
    .weekly-card {
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: var(--radius-xl);
      padding: 24px;
    }
    .weekly-card .card-label {
      color: rgba(255,255,255,0.5);
    }
    .weekly-number {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.1;
    }
    .weekly-desc {
      font-family: var(--font-sans);
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-top: 12px;
      line-height: 1.6;
    }

    /* ========== AI 建议卡片（引用样式） ========== */
    .ai-card {
      border-left: 3px solid var(--black);
      padding-left: 16px;
      background: var(--card);
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .ai-card .card-label {
      color: var(--accent);
      margin-bottom: 8px;
    }
    .ai-card .ai-text {
      font-family: var(--font-serif);
      font-size: 15px;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* ========== 快捷操作 ========== */
    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .action-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 8px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .action-btn:hover {
      transform: scale(0.96);
      opacity: 0.9;
    }
    .action-btn:active {
      transform: scale(0.94);
    }
    .action-btn i {
      font-size: 18px;
    }

    /* ========== 底部 Tab Bar ========== */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 393px;
      height: 80px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
      z-index: 200;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 4px 12px;
      text-decoration: none;
    }
    .tab-item i {
      font-size: 20px;
      color: var(--text-tertiary);
      transition: color 0.2s;
    }
    .tab-item span {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }
    .tab-item.active i {
      color: var(--black);
    }
    .tab-item.active span {
      color: var(--black);
      font-weight: 600;
    }
    .tab-item:hover i {
      color: var(--text-secondary);
    }
    .tab-item:active {
      transform: scale(0.92);
    }

    /* ========== 分隔线 ========== */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ========== 留白辅助 ========== */
    .spacer-sm { height: 12px; }
    .spacer-md { height: 20px; }
  </style>
</head>
<body>
  <!-- iOS 状态栏 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <i class="fas fa-signal"></i>
      <i class="fas fa-wifi"></i>
      <i class="fas fa-battery-full"></i>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="content">

    <!-- 顶部问候区 -->
    <div class="greeting-section">
      <div class="greeting-row">
        <div class="greeting-title">你好，<br>杨弘</div>
        <div class="greeting-date">
          Thu<br>
          Apr 2, 2026
        </div>
      </div>
    </div>

    <!-- Bento Grid -->
    <div class="bento-grid">

      <!-- 热量大卡片 -->
      <div class="card card-full calorie-card">
        <div class="card-label">Today's Calories</div>
        <div class="calorie-number">650</div>
        <div class="calorie-unit">大卡可用</div>
        <div class="calorie-detail">1,200 / 1,850 kcal</div>
        <div class="calorie-bar-track">
          <div class="calorie-bar-fill" style="width: 64.8%;"></div>
        </div>
      </div>

      <!-- 营养素三列 -->
      <div class="card-full macro-row">
        <div class="macro-card">
          <div class="macro-name">碳水</div>
          <div class="macro-value">120g</div>
          <div class="macro-target">/ 200g</div>
          <div class="macro-progress">
            <div class="macro-progress-fill" style="width: 60%;"></div>
          </div>
        </div>
        <div class="macro-card">
          <div class="macro-name">蛋白质</div>
          <div class="macro-value">68g</div>
          <div class="macro-target">/ 90g</div>
          <div class="macro-progress">
            <div class="macro-progress-fill" style="width: 75.5%;"></div>
          </div>
        </div>
        <div class="macro-card">
          <div class="macro-name">脂肪</div>
          <div class="macro-value">35g</div>
          <div class="macro-target">/ 55g</div>
          <div class="macro-progress">
            <div class="macro-progress-fill" style="width: 63.6%;"></div>
          </div>
        </div>
      </div>

      <!-- 步数卡片 -->
      <div class="card">
        <div class="card-label">Steps</div>
        <div class="step-icon"><i class="fas fa-shoe-prints"></i></div>
        <div class="step-number">6,842</div>
        <div class="step-target">目标 8,000</div>
      </div>

      <!-- 饮水量卡片 -->
      <div class="card">
        <div class="card-label">Water</div>
        <div style="font-size:20px; margin-bottom:10px;"><i class="fas fa-droplet"></i></div>
        <div class="water-number">1,200<span style="font-size:14px; font-family:var(--font-sans); color:var(--text-tertiary);">ml</span></div>
        <div class="water-target">/ 2,000ml</div>
        <div class="water-dots">
          <div class="water-dot filled"></div>
          <div class="water-dot filled"></div>
          <div class="water-dot filled"></div>
          <div class="water-dot filled"></div>
          <div class="water-dot filled"></div>
          <div class="water-dot filled"></div>
          <div class="water-dot"></div>
          <div class="water-dot"></div>
          <div class="water-dot"></div>
          <div class="water-dot"></div>
        </div>
      </div>

      <!-- 周报横幅 -->
      <div class="card card-full weekly-card">
        <div class="card-label">Weekly Digest</div>
        <div class="weekly-number">&minus;0.3 kg</div>
        <div class="weekly-desc">本周平均每日 1,680 大卡，达标率 85%。进度正常，继续加油。</div>
      </div>

      <!-- AI 提示卡片 -->
      <div class="card card-full ai-card">
        <div class="card-label"><i class="fas fa-sparkles" style="margin-right:4px;"></i> AI Insight</div>
        <div class="ai-text">杨弘，你的蛋白质摄入持续偏低。今晚试试鸡胸肉沙拉？</div>
      </div>

      <!-- 快捷操作 -->
      <div class="card-full actions-row">
        <button class="action-btn">
          <i class="fas fa-camera"></i>
          拍照记录
        </button>
        <button class="action-btn">
          <i class="fas fa-microphone"></i>
          语音输入
        </button>
        <button class="action-btn">
          <i class="fas fa-comment-dots"></i>
          问 AI
        </button>
      </div>

    </div><!-- /bento-grid -->

    <div class="spacer-md"></div>
  </div><!-- /content -->

  <!-- 底部 Tab Bar -->
  <div class="tab-bar">
    <a class="tab-item active" href="home.html">
      <i class="fas fa-house"></i>
      <span>首页</span>
    </a>
    <a class="tab-item" href="camera.html">
      <i class="fas fa-camera"></i>
      <span>拍照</span>
    </a>
    <a class="tab-item" href="meal-log.html">
      <i class="fas fa-utensils"></i>
      <span>记录</span>
    </a>
    <a class="tab-item" href="progress.html">
      <i class="fas fa-chart-line"></i>
      <span>进度</span>
    </a>
    <a class="tab-item" href="profile.html">
      <i class="fas fa-user"></i>
      <span>我的</span>
    </a>
  </div>
</body>
</html>
