<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>拍照识别 - 混合风格智能减脂助理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --border: #e5e5e5;
      --accent: #2d5a3d;
      --black: #000000;
      --white: #ffffff;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      width: 393px;
      height: 852px;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.6;
      position: relative;
    }
    body::-webkit-scrollbar { width: 0; }

    /* iOS 状态栏 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .status-bar .time { font-weight: 700; }
    .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }
    .status-bar .icons i { font-size: 12px; }

    .content {
      padding: 0 20px 100px;
    }

    /* 页面标题 */
    .page-title {
      font-family: var(--font-serif);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 16px 0 20px;
      color: var(--text-primary);
    }

    /* 相机取景区 */
    .camera-view {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      margin-bottom: 20px;
    }
    .camera-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* AI 检测框叠加 */
    .detection-box {
      position: absolute;
      border: 2px solid var(--black);
      border-radius: 4px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    .detection-box .det-label {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      letter-spacing: 0.04em;
    }
    .det-1 { top: 10%; left: 8%; width: 45%; height: 55%; }
    .det-2 { top: 20%; right: 12%; width: 35%; height: 50%; }
    .det-3 { bottom: 8%; left: 25%; width: 50%; height: 30%; }

    /* 模式切换 */
    .mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: var(--card);
      color: var(--text-tertiary);
      border: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mode-btn.active {
      background: var(--black);
      color: var(--white);
    }
    .mode-btn:hover:not(.active) {
      background: #f0f0f0;
    }

    /* 编号式食物列表 */
    .food-list {
      margin-bottom: 20px;
    }
    .food-item {
      display: flex;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .food-item:last-child { border-bottom: none; }
    .food-item:hover { background: rgba(0,0,0,0.02); }
    .food-num {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-tertiary);
      min-width: 36px;
    }
    .food-name {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }
    .food-weight {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-right: 16px;
    }
    .food-kcal {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: right;
      min-width: 70px;
    }

    /* 分隔线 */
    .divider {
      height: 1px;
      background: var(--text-primary);
      margin: 8px 0 20px;
    }

    /* 总计 */
    .total-section {
      text-align: center;
      margin-bottom: 20px;
    }
    .total-label {
      font-family: var(--font-sans);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .total-number {
      font-family: var(--font-serif);
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
    }
    .total-unit {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* 营养素分布 */
    .macro-summary {
      text-align: center;
      margin-bottom: 24px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .macro-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-tertiary);
      vertical-align: middle;
      margin: 0 10px;
    }

    /* AI 评语 */
    .ai-comment {
      border-left: 3px solid var(--black);
      padding-left: 16px;
      margin-bottom: 24px;
      border-radius: 0;
    }
    .ai-comment-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .ai-comment-text {
      font-family: var(--font-serif);
      font-size: 14px;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* 确认按钮 */
    .confirm-btn {
      width: 100%;
      padding: 16px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .confirm-btn:hover {
      opacity: 0.88;
    }
    .confirm-btn:active {
      transform: scale(0.98);
    }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 393px;
      height: 80px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
      z-index: 200;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 4px 12px;
      text-decoration: none;
    }
    .tab-item i {
      font-size: 20px;
      color: var(--text-tertiary);
      transition: color 0.2s;
    }
    .tab-item span {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--text-tertiary);
    }
    .tab-item.active i { color: var(--black); }
    .tab-item.active span { color: var(--black); font-weight: 600; }
    .tab-item:hover i { color: var(--text-secondary); }
    .tab-item:active { transform: scale(0.92); }
  </style>
</head>
<body>
  <!-- iOS 状态栏 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <i class="fas fa-signal"></i>
      <i class="fas fa-wifi"></i>
      <i class="fas fa-battery-full"></i>
    </div>
  </div>

  <div class="content">
    <!-- 页面标题 -->
    <div class="page-title">RECORD</div>

    <!-- 相机取景区 -->
    <div class="camera-view">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&h=450&fit=crop" alt="食物照片">
      <!-- AI 检测框 -->
      <div class="detection-box det-1">
        <span class="det-label">红烧肉 98%</span>
      </div>
      <div class="detection-box det-2">
        <span class="det-label">米饭 95%</span>
      </div>
      <div class="detection-box det-3">
        <span class="det-label">青菜 92%</span>
      </div>
    </div>

    <!-- 模式切换 -->
    <div class="mode-toggle">
      <button class="mode-btn">拍照模式</button>
      <button class="mode-btn active">识别结果</button>
    </div>

    <!-- 编号式食物列表 -->
    <div class="food-list">
      <div class="food-item">
        <span class="food-num">01</span>
        <span class="food-name">红烧肉</span>
        <span class="food-weight">280g</span>
        <span class="food-kcal">380 kcal</span>
      </div>
      <div class="food-item">
        <span class="food-num">02</span>
        <span class="food-name">米饭</span>
        <span class="food-weight">150g</span>
        <span class="food-kcal">170 kcal</span>
      </div>
      <div class="food-item">
        <span class="food-num">03</span>
        <span class="food-name">青菜</span>
        <span class="food-weight">100g</span>
        <span class="food-kcal">30 kcal</span>
      </div>
    </div>

    <!-- 分隔线 -->
    <div class="divider"></div>

    <!-- 总计 -->
    <div class="total-section">
      <div class="total-label">Total</div>
      <div class="total-number">580</div>
      <div class="total-unit">kcal</div>
    </div>

    <!-- 营养素分布 -->
    <div class="macro-summary">
      碳水 72g <span class="macro-dot"></span> 蛋白质 28g <span class="macro-dot"></span> 脂肪 18g
    </div>

    <!-- AI 评语 -->
    <div class="ai-comment">
      <div class="ai-comment-label"><i class="fas fa-sparkles" style="margin-right:4px;"></i> AI 评语</div>
      <div class="ai-comment-text">蛋白质充足，但红烧肉脂肪偏高。晚餐建议选择清蒸或水煮方式，补充绿叶蔬菜。</div>
    </div>

    <!-- 确认按钮 -->
    <button class="confirm-btn">确认记录</button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab-item" href="home.html">
      <i class="fas fa-house"></i>
      <span>首页</span>
    </a>
    <a class="tab-item active" href="camera.html">
      <i class="fas fa-camera"></i>
      <span>拍照</span>
    </a>
    <a class="tab-item" href="meal-log.html">
      <i class="fas fa-utensils"></i>
      <span>记录</span>
    </a>
    <a class="tab-item" href="progress.html">
      <i class="fas fa-chart-line"></i>
      <span>进度</span>
    </a>
    <a class="tab-item" href="profile.html">
      <i class="fas fa-user"></i>
      <span>我的</span>
    </a>
  </div>
</body>
</html>
