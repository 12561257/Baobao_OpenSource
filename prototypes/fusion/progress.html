<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>进度追踪 - 混合风格智能减脂助理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --border: #e5e5e5;
      --accent: #2d5a3d;
      --black: #000000;
      --white: #ffffff;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      width: 393px;
      height: 852px;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.6;
      position: relative;
    }
    body::-webkit-scrollbar { width: 0; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .status-bar .time { font-weight: 700; }
    .status-bar .icons { display: flex; gap: 6px; }
    .status-bar .icons i { font-size: 12px; }

    .content {
      padding: 0 20px 100px;
    }

    /* 页面标题 */
    .page-title {
      font-family: var(--font-serif);
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 16px 0 8px;
    }

    /* 核心数据 */
    .hero-stat {
      text-align: center;
      padding: 24px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .hero-number {
      font-family: var(--font-serif);
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }
    .hero-unit {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
    }
    .hero-subtitle {
      font-family: var(--font-serif);
      font-size: 18px;
      font-style: italic;
      color: var(--accent);
      margin-top: 8px;
    }

    /* 图表区域 */
    .chart-section {
      margin-bottom: 28px;
    }
    .chart-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }
    .chart-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 20px 12px 12px;
    }
    .chart-container svg {
      width: 100%;
      height: auto;
    }

    /* 数据网格 */
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .data-cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .data-cell:hover { transform: scale(0.98); }
    .data-cell-label {
      font-family: var(--font-sans);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .data-cell-value {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }

    /* 周报区域 */
    .weekly-report {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 24px;
    }
    .weekly-report-title {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
    }
    .report-row + .report-row {
      border-top: 1px solid #f0f0f0;
    }
    .report-label {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .report-value {
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 600;
    }

    /* AI 建议 */
    .ai-suggestion {
      border-left: 3px solid var(--black);
      padding-left: 16px;
      margin-bottom: 24px;
    }
    .ai-suggestion-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .ai-suggestion-text {
      font-family: var(--font-serif);
      font-size: 14px;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 393px;
      height: 80px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
      z-index: 200;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 4px 12px;
      text-decoration: none;
    }
    .tab-item i { font-size: 20px; color: var(--text-tertiary); }
    .tab-item span { font-size: 10px; color: var(--text-tertiary); }
    .tab-item.active i { color: var(--black); }
    .tab-item.active span { color: var(--black); font-weight: 600; }
    .tab-item:hover i { color: var(--text-secondary); }
    .tab-item:active { transform: scale(0.92); }
  </style>
</head>
<body>
  <!-- iOS 状态栏 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <i class="fas fa-signal"></i>
      <i class="fas fa-wifi"></i>
      <i class="fas fa-battery-full"></i>
    </div>
  </div>

  <div class="content">
    <!-- 页面标题 -->
    <div class="page-title">PROGRESS</div>

    <!-- 核心数据 -->
    <div class="hero-stat">
      <div class="hero-number">76.8</div>
      <div class="hero-unit">kg</div>
      <div class="hero-subtitle">已减重 2.2 kg</div>
    </div>

    <!-- SVG 折线图 -->
    <div class="chart-section">
      <div class="chart-label">30-Day Trend</div>
      <div class="chart-container">
        <svg viewBox="0 0 320 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 面积填充 -->
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.08"/>
              <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M10,20 L32,28 L54,35 L76,30 L98,42 L120,50 L142,48 L164,55 L186,60 L208,58 L230,68 L252,72 L274,78 L296,85 L318,90 L318,155 L10,155 Z" fill="url(#areaGrad)"/>
          <!-- 折线 -->
          <polyline
            points="10,20 32,28 54,35 76,30 98,42 120,50 142,48 164,55 186,60 208,58 230,68 252,72 274,78 296,85 318,90"
            stroke="#1a1a1a"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <!-- 关键节点 -->
          <circle cx="10" cy="20" r="3.5" fill="#1a1a1a"/>
          <text x="10" y="14" text-anchor="middle" font-family="Inter" font-size="8" fill="#999">79.0</text>

          <circle cx="120" cy="50" r="3.5" fill="#1a1a1a"/>
          <text x="120" y="44" text-anchor="middle" font-family="Inter" font-size="8" fill="#999">78.2</text>

          <circle cx="208" cy="58" r="3.5" fill="#1a1a1a"/>
          <text x="208" y="52" text-anchor="middle" font-family="Inter" font-size="8" fill="#999">77.5</text>

          <circle cx="318" cy="90" r="4" fill="#2d5a3d"/>
          <text x="318" y="84" text-anchor="middle" font-family="Inter" font-size="9" font-weight="600" fill="#2d5a3d">76.8</text>

          <!-- 日期标注 -->
          <text x="10" y="155" text-anchor="middle" font-family="Inter" font-size="7" fill="#bbb">3/3</text>
          <text x="120" y="155" text-anchor="middle" font-family="Inter" font-size="7" fill="#bbb">3/13</text>
          <text x="208" y="155" text-anchor="middle" font-family="Inter" font-size="7" fill="#bbb">3/22</text>
          <text x="318" y="155" text-anchor="middle" font-family="Inter" font-size="7" fill="#bbb">4/2</text>
        </svg>
      </div>
    </div>

    <!-- 数据网格 2x2 -->
    <div class="data-grid">
      <div class="data-cell">
        <div class="data-cell-label">距目标</div>
        <div class="data-cell-value">6.8 kg</div>
      </div>
      <div class="data-cell">
        <div class="data-cell-label">BMI</div>
        <div class="data-cell-value">25.1</div>
      </div>
      <div class="data-cell">
        <div class="data-cell-label">体脂率</div>
        <div class="data-cell-value">22.3%</div>
      </div>
      <div class="data-cell">
        <div class="data-cell-label">日均摄入</div>
        <div class="data-cell-value" style="font-size:22px;">1,680</div>
      </div>
    </div>

    <!-- 周报 -->
    <div class="weekly-report">
      <div class="weekly-report-title">Weekly Report</div>
      <div class="report-row">
        <span class="report-label">达标天数</span>
        <span class="report-value">5 / 7</span>
      </div>
      <div class="report-row">
        <span class="report-label">平均摄入</span>
        <span class="report-value">1,680 kcal</span>
      </div>
      <div class="report-row">
        <span class="report-label">运动消耗</span>
        <span class="report-value">1,200 kcal</span>
      </div>
      <div class="report-row">
        <span class="report-label">周减重</span>
        <span class="report-value">&minus;0.3 kg</span>
      </div>
      <div class="report-row">
        <span class="report-label">进度评估</span>
        <span class="report-value" style="color: var(--accent);">正常 &#10003;</span>
      </div>
    </div>

    <!-- AI 建议 -->
    <div class="ai-suggestion">
      <div class="ai-suggestion-label"><i class="fas fa-sparkles" style="margin-right:4px;"></i> AI 建议</div>
      <div class="ai-suggestion-text">根据你最近两周的数据，减重速度健康稳定。建议维持当前饮食计划，适当增加蛋白质摄入至每日 90g 以上。</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab-item" href="home.html">
      <i class="fas fa-house"></i>
      <span>首页</span>
    </a>
    <a class="tab-item" href="camera.html">
      <i class="fas fa-camera"></i>
      <span>拍照</span>
    </a>
    <a class="tab-item" href="meal-log.html">
      <i class="fas fa-utensils"></i>
      <span>记录</span>
    </a>
    <a class="tab-item active" href="progress.html">
      <i class="fas fa-chart-line"></i>
      <span>进度</span>
    </a>
    <a class="tab-item" href="profile.html">
      <i class="fas fa-user"></i>
      <span>我的</span>
    </a>
  </div>
</body>
</html>
