<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 - 智能减脂助理</title>
  <!-- Google Fonts: Playfair Display（衬线标题）+ Inter（无衬线正文） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== 设计令牌 ===== */
    :root {
      --black: #000000;
      --white: #ffffff;
      --gray-333: #333333;
      --gray-666: #666666;
      --gray-999: #999999;
      --gray-ccc: #cccccc;
      --gray-eee: #eeeeee;
      --gray-f5: #f5f5f5;
      --font-serif: 'Playfair Display', 'Georgia', serif;
      --font-sans: 'Inter', 'system-ui', sans-serif;
    }

    /* ===== 重置与基础 ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--white);
      color: var(--black);
      width: 393px;
      height: 852px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== iOS 状态栏 ===== */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 28px 0;
      height: 54px;
      flex-shrink: 0;
    }
    .status-bar .time {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .status-bar .icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar .icons svg {
      width: 16px;
      height: 16px;
    }

    /* ===== 主内容区 ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 32px 24px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar {
      display: none;
    }

    /* ===== 问候语区域 ===== */
    .greeting {
      margin-top: 16px;
    }
    .greeting h1 {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--black);
    }
    .greeting .date {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--gray-999);
      letter-spacing: 0.06em;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* ===== 核心数据区域 ===== */
    .calorie-block {
      margin-top: 48px;
      text-align: left;
    }
    .calorie-number {
      font-family: var(--font-serif);
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--black);
    }
    .calorie-label {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 300;
      color: var(--gray-666);
      letter-spacing: 0.12em;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ===== 营养素排版 ===== */
    .macro-section {
      margin-top: 48px;
      border-top: 0.5px solid var(--gray-ccc);
      padding-top: 24px;
    }
    .macro-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--gray-eee);
    }
    .macro-name {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-333);
      min-width: 72px;
    }
    .macro-value {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 500;
      color: var(--black);
    }
    .macro-unit {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 300;
      color: var(--gray-999);
      margin-left: 2px;
    }

    /* ===== 编辑式摘要段落 ===== */
    .summary {
      margin-top: 40px;
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--gray-666);
      font-style: italic;
      border-left: 2px solid var(--black);
      padding-left: 16px;
    }

    /* ===== 按钮区域 ===== */
    .actions {
      margin-top: 36px;
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px 0;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      outline: none;
    }
    .btn-primary {
      background: var(--black);
      color: var(--white);
    }
    .btn-primary:hover {
      background: var(--gray-333);
      transform: scale(0.98);
    }
    .btn-secondary {
      background: transparent;
      color: var(--black);
      border: 0.5px solid var(--black);
    }
    .btn-secondary:hover {
      background: var(--black);
      color: var(--white);
      transform: scale(0.98);
    }

    /* ===== 底部 Tab Bar ===== */
    .tab-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 28px;
      border-top: 0.5px solid var(--gray-eee);
      background: var(--white);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .tab-item:hover {
      opacity: 0.6;
    }
    .tab-item .tab-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-item .tab-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--gray-999);
      fill: none;
      stroke-width: 1.5;
    }
    .tab-item .tab-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 400;
      color: var(--gray-999);
      letter-spacing: 0.04em;
    }
    .tab-item.active .tab-icon svg {
      stroke: var(--black);
      stroke-width: 2;
    }
    .tab-item.active .tab-label {
      color: var(--black);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- iOS 状态栏 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <!-- 信号 -->
      <svg viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#000"/><rect x="5" y="5" width="3" height="7" rx="0.5" fill="#000"/><rect x="10" y="2" width="3" height="10" rx="0.5" fill="#000"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="#000"/></svg>
      <!-- Wi-Fi -->
      <svg viewBox="0 0 16 12"><path d="M8 10.5a1 1 0 110 2 1 1 0 010-2zM4.5 8.5C5.5 7.2 6.7 6.5 8 6.5s2.5.7 3.5 2M2 5.5C3.7 3.5 5.7 2.5 8 2.5s4.3 1 6 3" stroke="#000" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      <!-- 电池 -->
      <svg viewBox="0 0 28 13"><rect x="0" y="0.5" width="24" height="12" rx="2.5" stroke="#000" stroke-width="1" fill="none"/><rect x="2" y="2.5" width="18" height="8" rx="1" fill="#000"/><rect x="25" y="4" width="2.5" height="5" rx="1" fill="#000"/></svg>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="content">
    <!-- 问候 -->
    <div class="greeting">
      <h1>你好，<br>杨弘。</h1>
      <p class="date">2026年4月2日 · 星期四</p>
    </div>

    <!-- 核心热量数据 -->
    <div class="calorie-block">
      <div class="calorie-number">650</div>
      <div class="calorie-label">大卡可用</div>
    </div>

    <!-- 营养素排版 -->
    <div class="macro-section">
      <div class="macro-row">
        <span class="macro-name">碳水</span>
        <span><span class="macro-value">120</span><span class="macro-unit">g</span></span>
        <span class="macro-value" style="color:var(--gray-ccc)">/</span>
        <span class="macro-value" style="color:var(--gray-999)">200<span class="macro-unit">g</span></span>
      </div>
      <div class="macro-row">
        <span class="macro-name">蛋白质</span>
        <span><span class="macro-value">68</span><span class="macro-unit">g</span></span>
        <span class="macro-value" style="color:var(--gray-ccc)">/</span>
        <span class="macro-value" style="color:var(--gray-999)">90<span class="macro-unit">g</span></span>
      </div>
      <div class="macro-row">
        <span class="macro-name">脂肪</span>
        <span><span class="macro-value">35</span><span class="macro-unit">g</span></span>
        <span class="macro-value" style="color:var(--gray-ccc)">/</span>
        <span class="macro-value" style="color:var(--gray-999)">55<span class="macro-unit">g</span></span>
      </div>
    </div>

    <!-- 编辑式摘要 -->
    <p class="summary">
      今日已摄入 1,200 大卡，距离目标还差 650 大卡。你的蛋白质摄入稍低，晚餐建议补充鸡胸肉或鱼。
    </p>

    <!-- 操作按钮 -->
    <div class="actions">
      <a href="camera.html" class="btn btn-primary">记录饮食</a>
      <a href="ai-chat.html" class="btn btn-secondary">问助理</a>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="home.html" class="tab-item active">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.55 5.45 21 6 21H9M19 10L21 12M19 10V20C19 20.55 18.55 21 18 21H15M9 21C9 21 9 15 12 15C15 15 15 21 15 21M9 21H15" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="tab-label">首页</span>
    </a>
    <a href="camera.html" class="tab-item">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <span class="tab-label">拍照</span>
    </a>
    <a href="meal-log.html" class="tab-item">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <span class="tab-label">记录</span>
    </a>
    <a href="ai-chat.html" class="tab-item">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="tab-label">AI</span>
    </a>
    <a href="profile.html" class="tab-item">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="tab-label">我的</span>
    </a>
  </div>

</body>
</html>
